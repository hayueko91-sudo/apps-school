                    </div>

                    </div>

                    </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Waktu Mulai <span class="text-red-500">*</span></label>

                            <input type="datetime-local" id="inpTugasSelesai" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500" required>

                            </label>
                            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                <input type="checkbox" id="chkJenisFoto" value="Foto" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" style="appearance: auto;">
                                <span class="text-sm font-medium text-slate-700"><i class="fa-solid fa-image text-slate-400 w-4"></i> Foto</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                <input type="checkbox" id="chkJenisVideo" value="Video" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" style="appearance: auto;">
                                <span class="text-sm font-medium text-slate-700"><i class="fa-solid fa-video text-slate-400 w-4"></i> Video</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                <input type="checkbox" id="chkJenisFile" value="File" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" style="appearance: auto;">
                                <span class="text-sm font-medium text-slate-700"><i class="fa-solid fa-file-pdf text-slate-400 w-4"></i> File/Dokumen</span>
                            </label>
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onclick="closeModalFormTugas()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">Batal</button>
                        <button type="submit" id="btnSimpanTugas" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md shadow-indigo-200 transition-all flex items-center gap-2">
                            <span>Simpan Tugas</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>

            <div class="p-6 flex-1 overflow-y-auto custom-scrollbar flex flex-col bg-slate-50/50">

                    <p class="text-xs text-yellow-700 leading-tight">

                <!-- CONTAINER LIST JAWABAN SISWA -->
                <div class="mb-2">

                    <div id="containerJawabanMassal" class="grid grid-cols-1 lg:grid-cols-2 gap-4">

</template>

<script>
    // ==========================================
    // CACHE SYSTEM & GLOBAL STATES (ANTI-DELAY)
    // ==========================================
    var zCache_tugasLoaded = false;
    var zCache_tugasNilaiLoaded = false;
    var zCache_tugasNilaiData = null;

    var zState_mapingGuru = [];
    
    // Variabel Pagination Manajemen Tugas
    var zState_tugasData = []; 
    var zState_filteredTugas = [];
    var zState_pageTugas = 1;
    var zState_limitTugas = 10;
    
    // Variabel Pagination Detail Nilai Tugas
    var zState_detailKumpul = []; 
    var zState_filteredKumpul = []; 
    var zState_pageNilaiDetail = 1;
    var zState_limitNilaiDetail = 10;
    
    // Variabel State Centang Massal
    var zState_selectedKumpul = [];

    // ==========================================
    // UTILITY SWEETALERT2 TOAST (TOP-RIGHT)
    // ==========================================
    const ZettToast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
        }
    });

    function showToast(type, message, duration = 3000) {
        ZettToast.fire({
            icon: type, // 'success', 'error', 'warning', 'info'
            title: message,
            timer: duration
        });
    }

    let activeLoadingToast = null;
    function showLoadingToast(message) {
        activeLoadingToast = Swal.fire({
            toast: true,
            position: 'top-end',
            title: message,
            didOpen: () => {
                Swal.showLoading();
            },
            showConfirmButton: false,
            allowOutsideClick: false
        });
    }

    function closeLoadingToast() {
        if (activeLoadingToast) {
            Swal.close();
            activeLoadingToast = null;
        }
    }

    // ==========================================
    // BACKGROUND PREFETCHING (SENYAP TANPA DELAY)
    // ==========================================
    function prefetchModulData() {
        if (!currentUser) return;
        
        // 1. Prefetch Manajemen Tugas
        if (!zCache_tugasLoaded) {
            google.script.run.withSuccessHandler(res => {
                if(res.status === 'success') {
                    zState_tugasData = res.data;
                    zState_filteredTugas = [...res.data];
                    zCache_tugasLoaded = true;
                    // Jika user sedang berada di menu Manajemen Tugas, langsung render datanya
                    const tbody = document.getElementById('tabelTugasBody');
                    if (tbody && tbody.querySelector('#loadingRowTugas')) {
                        renderTugasTable();
                    }
                }
            }).getTugasManajemenData();
        }

        // 2. Prefetch Nilai Tugas
        if (!zCache_tugasNilaiLoaded) {
            google.script.run.withSuccessHandler(res => {
                if(res.status === 'success') {
                    zCache_tugasNilaiData = res.data;
                    zCache_tugasNilaiLoaded = true;
                    // Jika user sedang berada di menu Nilai Tugas, langsung render datanya
                    const container = document.getElementById('containerNilaiKartu');
                    if (container && container.querySelector('.loader-spin')) {
                        renderTugasNilaiCards(res.data);
                    }
                }
            }).getDaftarTugasUntukDinilai(currentUser);
        }
        
        // 3. Prefetch Mapping Guru
        fetchMapingGuruForDropdown();
    }

    // Trigger prefetch otomatis saat login terdeteksi
    (function() {
        let waitUserInterval = setInterval(() => {
            if (typeof currentUser !== 'undefined' && currentUser) {
                clearInterval(waitUserInterval);
                prefetchModulData();
            }
        }, 300);
    })();

    // Fungsi Format Tanggal
    function formatTanggalTeks(dateString) {
        if (!dateString || dateString === '-') return '-';
        if(dateString.includes('-')) {
            let parts = dateString.split(' ');
            let dateParts = parts[0].split('-');
            if(dateParts.length === 3) {
                const bulanIndo = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
                let year = dateParts[0];
                let monthIdx = parseInt(dateParts[1]) - 1;
                let day = parseInt(dateParts[2]);
                let timePart = parts[1] || '';
                if(monthIdx >= 0 && monthIdx <= 11) {
                     return `${day} ${bulanIndo[monthIdx]} ${year}<br><span class="text-[9px] text-indigo-500 font-bold">${timePart}</span>`;
                }
            }
        }
        return dateString;
    }

    function formatTanggalCetak(dateString) {
        if (!dateString || dateString === '-') return '-';
        if(dateString.includes('-')) {
            let parts = dateString.split(' ');
            let dateParts = parts[0].split('-');
            if(dateParts.length === 3) {
                const bulanIndo = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
                let year = dateParts[0];
                let monthIdx = parseInt(dateParts[1]) - 1;
                let day = parseInt(dateParts[2]);
                let timePart = parts[1] || '';
                if(monthIdx >= 0 && monthIdx <= 11) {
                     return `${day} ${bulanIndo[monthIdx]} ${year} ${timePart}`;
                }
            }
        }
        return dateString;
    }

    function initModulTugas() {
        const isGuru = currentUser && currentUser.role.toLowerCase() === 'guru';
        const colHeaderGuru = document.getElementById('colHeaderGuru');
        if (colHeaderGuru) {
            if (isGuru) colHeaderGuru.classList.add('hidden');
            else colHeaderGuru.classList.remove('hidden');
        }

        // Jika cache sudah siap, langsung render instan tanpa loading
        if (zCache_tugasLoaded) {
            renderTugasTable();
        } else {
            fetchDataTugasTable();
        }

        if (zState_mapingGuru && zState_mapingGuru.length > 0) {
            renderMapingGuruDropdown(zState_mapingGuru);
        } else {
            fetchMapingGuruForDropdown();
        }
    }

    function fetchMapingGuruForDropdown() {
        google.script.run.withSuccessHandler(res => {
            if(res.status === 'success') {
                zState_mapingGuru = res.data;
                renderMapingGuruDropdown(res.data);
            }
        }).getMapingGuruForTugasList();
    }

    function renderMapingGuruDropdown(data) {
        const selectGuru = document.getElementById('inpTugasGuru');
        if(selectGuru) {
            selectGuru.innerHTML = '<option value="">-- Pilih Guru / Mapel --</option>';
            data.forEach(item => {
                const kelasJson = JSON.stringify(item.kelasList).replace(/'/g, "&#39;");
                selectGuru.innerHTML += `<option value="${item.guru}" data-mapel="${item.mapel}" data-kelas='${kelasJson}'>${item.guru} - ${item.mapel}</option>`;
            });
        }
    }

    function autoFillMapelTugas(isEditMode = false, existingKelas = '') {
        const selectGuru = document.getElementById('inpTugasGuru');
        const selectedOption = selectGuru.options[selectGuru.selectedIndex];
        const inputMapel = document.getElementById('inpTugasMapel');
        const selectKelas = document.getElementById('inpTugasKelas');
        
        selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
        if(selectedOption && selectedOption.value !== "") {
            inputMapel.value = selectedOption.getAttribute('data-mapel') || '-';
            const kelasRaw = selectedOption.getAttribute('data-kelas');
            if(kelasRaw) {
                try {
                    const kelasList = JSON.parse(kelasRaw.replace(/&#39;/g, "'"));
                    kelasList.forEach(k => { selectKelas.innerHTML += `<option value="${k}">${k}</option>`; });
                } catch(e) {}
            }
        } else { inputMapel.value = ''; }

        if (isEditMode && existingKelas) selectKelas.value = existingKelas;
    }

    function fetchDataTugasTable() {
        const tbody = document.getElementById('tabelTugasBody');
        const isGuru = currentUser && currentUser.role.toLowerCase() === 'guru';
        const colSpanCount = isGuru ? 12 : 13; 
        
        tbody.innerHTML = `<tr><td colspan="${colSpanCount}" class="px-4 py-8 text-center text-slate-500"><div class="loader-spin border-slate-300 border-t-indigo-600 mb-2"></div><br>Memuat data tugas...</td></tr>`;
        
        google.script.run.withSuccessHandler(res => {
            if(res.status === 'success') {
                zState_tugasData = res.data;
                zState_filteredTugas = [...res.data];
                zCache_tugasLoaded = true;
                zState_pageTugas = 1;
                renderTugasTable();
            } else {
                tbody.innerHTML = `<tr><td colspan="${colSpanCount}" class="px-4 py-8 text-center text-red-500">${res.message}</td></tr>`;
            }
        }).getTugasManajemenData();
    }

    // ==========================================
    // REUSABLE ROW GENERATOR (PARTIAL RENDERING)
    // ==========================================
    function getTugasRowInnerHtml(t, globalIndex) {
        const isGuru = currentUser && currentUser.role.toLowerCase() === 'guru';
        const checkIcon = (val) => val === true || val === "TRUE" ? '<i class="fa-solid fa-check text-emerald-500"></i>' : '<i class="fa-solid fa-minus text-slate-300"></i>';
        const fmtSplitDate = (d, timeStrRaw) => {
            if(!d) return '-';
            let dStr = String(d).replace(/'/g, "");
            let year, monthIdx, day;
            if(dStr.includes('-')) {
                const parts = dStr.split('-');
                year = parts[0]; monthIdx = parseInt(parts[1]) - 1; day = parseInt(parts[2]);
            } else return `${d} ${timeStrRaw}`; 
            
            const bulanIndo = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            const month = bulanIndo[monthIdx];
            const dayStr = String(day).padStart(2, '0');
            let tStr = timeStrRaw ? String(timeStrRaw).replace(/'/g, "") : '00:00';
            return `${dayStr} ${month} ${year} <br><span class="text-indigo-500 font-bold">${tStr}</span>`;
        };
        
        const isBuka = t.status === 'Buka';
        const toggleClass = isBuka ? 'text-indigo-600' : 'text-slate-400';
        const toggleIcon = isBuka ? 'fa-toggle-on' : 'fa-toggle-off';
        const statusLabel = isBuka ? '<span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-[10px] font-bold shadow-sm">Buka</span>' : '<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-[10px] font-bold shadow-sm">Tutup</span>';

        const tdGuru = isGuru ? '' : `<td class="px-4 py-3 border-r border-slate-100"><div class="font-bold text-slate-800">${t.guru}</div></td>`;

        return `
            <td class="px-4 py-3 text-center border-r border-slate-100 font-medium">${globalIndex}</td>
            ${tdGuru}
            <td class="px-4 py-3 border-r border-slate-100 text-xs font-semibold text-indigo-600 bg-indigo-50/30">${t.mapel}</td>
            <td class="px-4 py-3 border-r border-slate-100"><div class="font-bold text-slate-800 line-clamp-2">${t.judul}</div></td>
            <td class="px-4 py-3 border-r border-slate-100 text-xs font-bold text-slate-600 whitespace-nowrap text-center">${t.kelas}</td>
            <td class="px-4 py-3 border-r border-slate-100 text-[10px] whitespace-nowrap text-center">${fmtSplitDate(t.tglMulai, t.jamMulai)}</td>
            <td class="px-4 py-3 border-r border-slate-100 text-[10px] whitespace-nowrap text-red-600 font-medium text-center bg-red-50/30">${fmtSplitDate(t.tglSelesai, t.jamSelesai)}</td>
            <td class="px-2 py-3 text-center border-r border-slate-100 bg-slate-50/50">${checkIcon(t.reqTeks)}</td>
            <td class="px-2 py-3 text-center border-r border-slate-100 bg-slate-50/50">${checkIcon(t.reqFoto)}</td>
            <td class="px-2 py-3 text-center border-r border-slate-100 bg-slate-50/50">${checkIcon(t.reqVideo)}</td>
            <td class="px-2 py-3 text-center border-r border-slate-100 bg-slate-50/50">${checkIcon(t.reqFile)}</td>
            <td class="px-4 py-3 text-center border-r border-slate-100">
                <button onclick="toggleStatusTugas('${t.id}', '${t.status}')" class="flex flex-col items-center justify-center gap-1 mx-auto hover:scale-110 transition-transform" title="Klik untuk ubah status">
                    <i class="fa-solid ${toggleIcon} text-2xl ${toggleClass}"></i>
                    ${statusLabel}
                </td>
            <td class="px-4 py-3 text-center border-r border-slate-100">
                <div class="flex items-center justify-center gap-2">
                    <button onclick="editTugas('${t.id}')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 hover:bg-blue-100 hover:text-blue-600 transition-colors flex items-center justify-center shadow-sm border border-slate-200" title="Edit Tugas">
                        <i class="fa-solid fa-pen-to-square text-xs"></i>
                    </button>
                    <button onclick="hapusTugas('${t.id}')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-600 transition-colors flex items-center justify-center shadow-sm border border-slate-200" title="Hapus Tugas">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </div>
            </td>
        `;
    }

    function renderTugasTable() {
        const data = zState_filteredTugas;
        const tbody = document.getElementById('tabelTugasBody');
        const paginationContainer = document.getElementById('paginationTugas');
        const isGuru = currentUser && currentUser.role.toLowerCase() === 'guru';
        const colSpanCount = isGuru ? 12 : 13;

        if(!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${colSpanCount}" class="px-4 py-8 text-center text-slate-500 bg-slate-50/50"><i class="fa-solid fa-folder-open text-3xl text-slate-300 mb-3 block"></i> Belum ada tugas yang dibuat.</td></tr>`;
            if(paginationContainer) paginationContainer.innerHTML = '';
            return;
        }

        const startIndex = (zState_pageTugas - 1) * zState_limitTugas;
        const endIndex = startIndex + zState_limitTugas;
        const paginatedData = data.slice(startIndex, endIndex);

        let html = '';
        paginatedData.forEach((t, i) => {
            const globalIndex = startIndex + i + 1;
            html += `<tr id="row-tugas-${t.id}" data-id="${t.id}" class="hover:bg-indigo-50/30 transition-colors">${getTugasRowInnerHtml(t, globalIndex)}</tr>`;
        });
        tbody.innerHTML = html;
        
        renderPaginationControlsTugas(data.length);
    }

    function renderPaginationControlsTugas(totalItems) {
        const totalPages = Math.ceil(totalItems / zState_limitTugas);
        const container = document.getElementById('paginationTugas');
        if(!container) return;

        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        const startIndex = (zState_pageTugas - 1) * zState_limitTugas + 1;
        const endIndex = Math.min(startIndex + zState_limitTugas - 1, totalItems);

        let btnHtml = `
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between w-full">
            <div>
                <p class="text-sm text-slate-700">
                    Menampilkan <span class="font-medium">${startIndex}</span> sampai <span class="font-medium">${endIndex}</span> dari <span class="font-medium">${totalItems}</span> tugas
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                    <button onclick="changePageTugas(${zState_pageTugas - 1})" ${zState_pageTugas === 1 ? 'disabled class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-300 bg-slate-50 text-sm font-medium text-slate-400 cursor-not-allowed"' : 'class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-300 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 transition-colors"'}>
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
            if (i === zState_pageTugas) {
                btnHtml += `<button aria-current="page" class="z-10 bg-indigo-50 border-indigo-500 text-indigo-600 relative inline-flex items-center px-4 py-2 border text-sm font-bold shadow-inner">${i}</button>`;
            } else {
                btnHtml += `<button onclick="changePageTugas(${i})" class="bg-white border-slate-300 text-slate-500 hover:bg-slate-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium transition-colors">${i}</button>`;
            }
        }

        btnHtml += `
                    <button onclick="changePageTugas(${zState_pageTugas + 1})" ${zState_pageTugas === totalPages ? 'disabled class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-slate-300 bg-slate-50 text-sm font-medium text-slate-400 cursor-not-allowed"' : 'class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-slate-300 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 transition-colors"'}>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </nav>
            </div>
        </div>
        
        <div class="flex items-center justify-between sm:hidden w-full">
            <button onclick="changePageTugas(${zState_pageTugas - 1})" ${zState_pageTugas === 1 ? 'disabled class="relative inline-flex items-center px-4 py-2 border border-slate-300 text-sm font-medium rounded-lg text-slate-400 bg-slate-50 cursor-not-allowed"' : 'class="relative inline-flex items-center px-4 py-2 border border-slate-300 text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 transition-colors"'}>
                Seblm
            </button>
            <span class="text-sm font-medium text-slate-700">Hal ${zState_pageTugas} / ${totalPages}</span>
            <button onclick="changePageTugas(${zState_pageTugas + 1})" ${zState_pageTugas === totalPages ? 'disabled class="relative inline-flex items-center px-4 py-2 border border-slate-300 text-sm font-medium rounded-lg text-slate-400 bg-slate-50 cursor-not-allowed"' : 'class="relative inline-flex items-center px-4 py-2 border border-slate-300 text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 transition-colors"'}>
                Lanjut
            </button>
        </div>
        `;

        container.innerHTML = btnHtml;
    }

    function changePageTugas(newPage) {
        const totalPages = Math.ceil(zState_filteredTugas.length / zState_limitTugas);
        if (newPage >= 1 && newPage <= totalPages) {
            zState_pageTugas = newPage;
            renderTugasTable();
        }
    }

    function showModalFormTugas() {
        document.getElementById('formTambahTugas').reset();
        document.getElementById('inpTugasIdEdit').value = '';
        document.getElementById('inpTugasMapel').value = '';
        document.getElementById('inpTugasKelas').innerHTML = '<option value="">-- Pilih Kelas --</option>';
        document.getElementById('modalFormTitle').innerHTML = '<i class="fa-solid fa-list-check text-indigo-600 mr-2"></i> Form Tambah Tugas';
        document.getElementById('btnSimpanTugas').innerHTML = '<span>Simpan Tugas</span>';
        document.getElementById('lblTugasFoto').innerHTML = 'Foto Instruksi <span class="text-slate-400 font-normal text-xs">(Opsional)</span>';
        
        const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('inpTugasMulai').value = now.toISOString().slice(0, 16);
        const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('inpTugasSelesai').value = tomorrow.toISOString().slice(0, 16);

        if (currentUser && currentUser.role.toLowerCase() === 'guru') {
            document.getElementById('containerGuruMapelAdmin').classList.add('hidden');
            document.getElementById('inpTugasGuru').removeAttribute('required'); 
            document.getElementById('lblGuruName').innerText = currentUser.nama;
            const myMaping = zState_mapingGuru.find(m => m.guru.toLowerCase() === currentUser.nama.toLowerCase());
            document.getElementById('lblGuruMapel').innerText = myMaping ? myMaping.mapel : '-';
            const selectKelas = document.getElementById('inpTugasKelas');
            selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            if(myMaping && myMaping.kelasList) { myMaping.kelasList.forEach(k => { selectKelas.innerHTML += `<option value="${k}">${k}</option>`; }); }
            document.getElementById('containerGuruMapelGuru').classList.remove('hidden');
        } else {
            document.getElementById('containerGuruMapelAdmin').classList.remove('hidden');
            document.getElementById('inpTugasGuru').setAttribute('required', 'true');
            document.getElementById('containerGuruMapelGuru').classList.add('hidden');
        }
        document.getElementById('modalFormTugas').classList.remove('hidden');
    }

    function closeModalFormTugas() { document.getElementById('modalFormTugas').classList.add('hidden'); }

    function editTugas(id) {
        const t = zState_tugasData.find(x => x.id === id);
        if(!t) return showToast('error', 'Data tidak ditemukan.');
        showModalFormTugas(); 
        document.getElementById('inpTugasIdEdit').value = t.id;
        document.getElementById('modalFormTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-indigo-600 mr-2"></i> Form Edit Tugas';
        document.getElementById('btnSimpanTugas').innerHTML = '<span>Update Tugas</span>';
        document.getElementById('inpTugasJudul').value = t.judul;
        document.getElementById('inpTugasInstruksi').value = t.instruksi;
        
        const toDateTimeLocal = (d, timeStrRaw) => { if(!d) return ''; return `${String(d).replace(/'/g, "")}T${timeStrRaw ? String(timeStrRaw).replace(/'/g, "") : '00:00'}`; };
        document.getElementById('inpTugasMulai').value = toDateTimeLocal(t.tglMulai, t.jamMulai);
        document.getElementById('inpTugasSelesai').value = toDateTimeLocal(t.tglSelesai, t.jamSelesai);
        document.getElementById('chkJenisTeks').checked = (t.reqTeks === true || t.reqTeks === "TRUE");
        document.getElementById('chkJenisFoto').checked = (t.reqFoto === true || t.reqFoto === "TRUE");
        document.getElementById('chkJenisVideo').checked = (t.reqVideo === true || t.reqVideo === "TRUE");
        document.getElementById('chkJenisFile').checked = (t.reqFile === true || t.reqFile === "TRUE");

        if (!(currentUser && currentUser.role.toLowerCase() === 'guru')) {
            document.getElementById('inpTugasGuru').value = t.guru;
            autoFillMapelTugas(true, t.kelas);
        } else { document.getElementById('inpTugasKelas').value = t.kelas; }
    }

    async function submitFormTugas(e) {
        e.preventDefault();
        const isTeks = document.getElementById('chkJenisTeks').checked;
        const isFoto = document.getElementById('chkJenisFoto').checked;
        const isVideo = document.getElementById('chkJenisVideo').checked;
        const isFile = document.getElementById('chkJenisFile').checked;
        const idTugasEdit = document.getElementById('inpTugasIdEdit').value;

        if(!isTeks && !isFoto && !isVideo && !isFile) return showToast('warning', 'Minimal pilih satu jenis bukti!');

        let finalGuru = "", finalMapel = "";
        if (currentUser && currentUser.role.toLowerCase() === 'guru') { finalGuru = currentUser.nama; finalMapel = document.getElementById('lblGuruMapel').innerText; } 
        else { finalGuru = document.getElementById('inpTugasGuru').value; finalMapel = document.getElementById('inpTugasMapel').value; if(!finalGuru) return showToast('warning', 'Pilih Guru!'); }

        const payload = {
            idTugasEdit: idTugasEdit, guru: finalGuru, mapel: finalMapel, kelas: document.getElementById('inpTugasKelas').value, 
            judul: document.getElementById('inpTugasJudul').value, mulai: document.getElementById('inpTugasMulai').value,
            selesai: document.getElementById('inpTugasSelesai').value, instruksi: document.getElementById('inpTugasInstruksi').value,
            reqTeks: isTeks, reqFoto: isFoto, reqVideo: isVideo, reqFile: isFile, fotoBase64: ""
        };

        const btnText = idTugasEdit ? 'Update Tugas' : 'Simpan Tugas';
        setBtnLoading('btnSimpanTugas', true, 'Memproses...');

        try {
            const fileFoto = document.getElementById('inpTugasFoto').files.length > 0 ? document.getElementById('inpTugasFoto').files[0] : null;
            if(fileFoto) payload.fotoBase64 = await toBase64AndCompress(fileFoto, 800);

            google.script.run.withSuccessHandler(res => {
                setBtnLoading('btnSimpanTugas', false, btnText);
                if(res.status === 'success') { 
                    showToast('success', idTugasEdit ? 'Tugas berhasil diperbarui.' : 'Tugas berhasil disimpan.'); 
                    closeModalFormTugas(); 
                    
                    // PARTIAL RENDERING (Dom-based / In-Memory update)
                    if (idTugasEdit) {
                        const updatedTugas = res.data;
                        const idx = zState_tugasData.findIndex(x => x.id === updatedTugas.id);
                        if (idx !== -1) {
                            if (!updatedTugas.fotoBase64 || updatedTugas.fotoBase64.trim() === '') {
                                updatedTugas.fotoBase64 = zState_tugasData[idx].fotoBase64;
                            }
                            zState_tugasData[idx] = updatedTugas;
                        }
                        const fIdx = zState_filteredTugas.findIndex(x => x.id === updatedTugas.id);
                        if (fIdx !== -1) {
                            if (!updatedTugas.fotoBase64 || updatedTugas.fotoBase64.trim() === '') {
                                updatedTugas.fotoBase64 = zState_filteredTugas[fIdx].fotoBase64;
                            }
                            zState_filteredTugas[fIdx] = updatedTugas;
                        }
                        
                        // Render ulang baris terkait saja
                        const rowEl = document.getElementById(`row-tugas-${updatedTugas.id}`);
                        if (rowEl) {
                            const globalIndex = zState_filteredTugas.findIndex(x => x.id === updatedTugas.id) + 1;
                            rowEl.innerHTML = getTugasRowInnerHtml(updatedTugas, globalIndex);
                            rowEl.classList.add('bg-emerald-50');
                            setTimeout(() => rowEl.classList.remove('bg-emerald-50'), 1500);
                        }
                    } else {
                        // Tambah tugas baru di paling depan
                        const newTugas = res.data;
                        zState_tugasData.unshift(newTugas);
                        zState_filteredTugas.unshift(newTugas);
                        
                        // Kembalikan ke halaman 1 dan render lokal cepat
                        zState_pageTugas = 1;
                        renderTugasTable();
                        
                        // Efek highlight baris baru
                        setTimeout(() => {
                            const newRow = document.getElementById(`row-tugas-${newTugas.id}`);
                            if (newRow) {
                                newRow.classList.add('bg-emerald-50');
                                setTimeout(() => newRow.classList.remove('bg-emerald-50'), 2000);
                            }
                        }, 100);
                    }
                    
                    // Perbarui cache Nilai juga agar sinkron
                    zCache_tugasNilaiLoaded = false;
                    prefetchModulData();

                } else {
                    showToast('error', res.message);
                }
            }).withFailureHandler(err => { 
                setBtnLoading('btnSimpanTugas', false, btnText); 
                showToast('error', 'Gagal memproses ke server.'); 
            })[idTugasEdit ? 'updateDataTugasBackend' : 'simpanDataTugasBaru'](payload);
        } catch (error) { 
            setBtnLoading('btnSimpanTugas', false, btnText); 
            showToast('error', 'Gagal memproses gambar.'); 
        }
    }

    function hapusTugas(id) {
        Swal.fire({ 
            title: 'Hapus Tugas?', 
            text: 'Tindakan ini tidak dapat dibatalkan.',
            icon: 'warning', 
            showCancelButton: true, 
            confirmButtonColor: '#ef4444', 
            confirmButtonText: 'Ya, Hapus!' 
        }).then((result) => {
            if (result.isConfirmed) {
                showLoadingToast('Sedang menghapus tugas...');
                google.script.run.withSuccessHandler(res => {
                    closeLoadingToast();
                    if(res.status === 'success') { 
                        showToast('success', 'Data tugas berhasil dihapus.'); 
                        
                        // Hapus dari data memory
                        zState_tugasData = zState_tugasData.filter(x => x.id !== id);
                        zState_filteredTugas = zState_filteredTugas.filter(x => x.id !== id);
                        
                        // Animasi hapus baris dari DOM sebelum render ulang pagination
                        const rowEl = document.getElementById(`row-tugas-${id}`);
                        if (rowEl) {
                            rowEl.classList.add('opacity-0', 'scale-95', 'transition-all', 'duration-500');
                            setTimeout(() => {
                                rowEl.remove();
                                renderTugasTable(); 
                            }, 500);
                        }
                        
                        // Perbarui cache Nilai
                        zCache_tugasNilaiLoaded = false;
                        prefetchModulData();
                    } else {
                        showToast('error', res.message);
                    }
                }).hapusDataTugasBackend(id);
            }
        });
    }

    function toggleStatusTugas(id, stat) {
        const nextStatus = stat === 'Buka' ? 'Tutup' : 'Buka';
        Swal.fire({ 
            title: 'Ubah Status Tugas?', 
            icon: 'question', 
            showCancelButton: true, 
            confirmButtonColor: '#4f46e5', 
            confirmButtonText: 'Ya, Ubah!' 
        }).then((result) => {
            if (result.isConfirmed) {
                showLoadingToast('Memproses pembaruan status...');
                google.script.run.withSuccessHandler(res => {
                    closeLoadingToast();
                    if(res.status === 'success') { 
                        showToast('success', 'Status berhasil diperbarui.'); 
                        
                        // Update memory lokal
                        const t = zState_tugasData.find(x => x.id === id);
                        if (t) t.status = nextStatus;
                        const ft = zState_filteredTugas.find(x => x.id === id);
                        if (ft) ft.status = nextStatus;

                        // Update DOM baris bersangkutan saja
                        const rowEl = document.getElementById(`row-tugas-${id}`);
                        if (rowEl) {
                            const globalIndex = zState_filteredTugas.findIndex(x => x.id === id) + 1;
                            rowEl.innerHTML = getTugasRowInnerHtml(ft, globalIndex);
                            rowEl.classList.add('bg-indigo-50/50');
                            setTimeout(() => rowEl.classList.remove('bg-indigo-50/50'), 1000);
                        }
                        
                        // Bersihkan cache Nilai agar tetap sinkron
                        zCache_tugasNilaiLoaded = false;
                        prefetchModulData();
                    } else {
                        showToast('error', res.message);
                    }
                }).toggleStatusTugasBackend(id, nextStatus);
            }
        });
    }

    function initTugasNilai() {
        const container = document.getElementById('containerNilaiKartu');
        
        // Memakai Cache Data jika sudah ter-prefetch senyap sebelumnya
        if(zCache_tugasNilaiLoaded && zCache_tugasNilaiData) {
            renderTugasNilaiCards(zCache_tugasNilaiData);
        } else {
            container.innerHTML = '<div class="col-span-full p-8 text-center text-slate-500 bg-white rounded-2xl"><div class="loader-spin border-t-indigo-600 mb-2"></div><br>Memuat kartu tugas...</div>';
            google.script.run.withSuccessHandler(res => {
                if(res.status === 'success') {
                    zCache_tugasNilaiData = res.data;
                    zCache_tugasNilaiLoaded = true;
                    renderTugasNilaiCards(res.data);
                } else {
                    container.innerHTML = `<div class="col-span-full p-8 text-center text-red-500">${res.message}</div>`;
                }
            }).getDaftarTugasUntukDinilai(currentUser);
        }
    }

    function renderTugasNilaiCards(data) {
        const container = document.getElementById('containerNilaiKartu');
        if(!data || data.length === 0) {
            container.innerHTML = `<div class="col-span-full p-8 text-center bg-white rounded-2xl border border-slate-100"><i class="fa-solid fa-mug-hot text-4xl text-slate-300 mb-3"></i><p class="text-slate-500 font-medium">Belum ada data tugas untuk dinilai.</p></div>`;
            return;
        }

        container.innerHTML = data.map(d => {
            let statusBadge = '';
            if (d.totKumpul === 0) {
                statusBadge = `<span class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-bold flex items-center shadow-sm"><i class="fa-regular fa-clock mr-1"></i> Belum Ada Kumpul</span>`;
            } else if (d.totKoreksi > 0) {
                statusBadge = `<span class="text-[10px] bg-rose-100 text-rose-700 px-3 py-1.5 rounded-full font-bold flex items-center shadow-sm animate-pulse"><i class="fa-solid fa-bell mr-1"></i> ${d.totKoreksi} Perlu Koreksi</span>`;
            } else {
                statusBadge = `<span class="text-[10px] bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full font-bold shadow-sm"><i class="fa-solid fa-check mr-1"></i> Semua Dinilai</span>`;

            <div onclick="bukaDetailNilaiTugas('${d.id}')" class="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all cursor-pointer relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-2 h-full ${d.totKoreksi > 0 ? 'bg-rose-500' : 'bg-indigo-500'}"></div>
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] font-bold text-indigo-700 bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-md uppercase tracking-wide">${d.mapel}</span>
                    <span class="text-[10px] text-slate-500 font-bold bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100"><i class="fa-regular fa-calendar mr-1"></i> ${d.tglBuat}</span>
                </div>
                <h4 class="font-bold text-slate-800 text-lg mb-1 leading-tight group-hover:text-indigo-600 transition-colors">${d.judul}</h4>
                <div class="text-xs text-slate-500 font-medium mb-4"><i class="fa-solid fa-users-rectangle text-slate-400 mr-1"></i> Kelas ${d.kelas}</div>
                
                <div class="grid grid-cols-2 gap-2 mb-4 text-[10px] font-bold">
                    <div class="bg-emerald-50 text-emerald-700 border border-emerald-100 p-2 rounded-lg text-center">Sudah Kumpul<br><span class="text-lg">${d.totKumpul}</span></div>
                    <div class="bg-slate-50 text-slate-500 border border-slate-100 p-2 rounded-lg text-center">Belum Kumpul<br><span class="text-lg">${d.totBelum}</span></div>

                <div class="flex items-center justify-between border-t border-slate-100 pt-4">

                    ${statusBadge}
                </div>

    }

    function bukaDetailNilaiTugas(idTugas) {
        renderTemplate('contentArea', 'tpl-tugas-nilai-detail');
        
        zState_selectedKumpul = []; 
        if(document.getElementById('lblCountBtnMassal')) document.getElementById('lblCountBtnMassal').innerText = '0';
        if(document.getElementById('chkSelectAllKumpul')) document.getElementById('chkSelectAllKumpul').checked = false;
        
        const tbody = document.getElementById('tabelNilaiDetailBody');
        document.getElementById('paginationNilaiDetail').innerHTML = ''; 
        
        tbody.innerHTML = `<tr><td colspan="11" class="px-4 py-8 text-center text-slate-500"><div class="loader-spin border-t-indigo-600 mb-2"></div><br>Mengambil data siswa dan nilai...</td></tr>`;
        
        google.script.run.withSuccessHandler(res => {
            if(res.status === 'success') {
                let rawData = res.data || [];
                rawData.sort((a, b) => {
                    let kelasA = (a.kelas || "").toString().trim().toLowerCase();
                    let kelasB = (b.kelas || "").toString().trim().toLowerCase();
                    if (kelasA === kelasB) {
                        let namaA = (a.nama || "").toString().trim().toLowerCase();
                        let namaB = (b.nama || "").toString().trim().toLowerCase();
                        return namaA.localeCompare(namaB);
                    }
                    return kelasA.localeCompare(kelasB);
                });

                zState_detailKumpul = rawData;
                filterDetailNilaiTugas(); 
            } else {
                tbody.innerHTML = `<tr><td colspan="11" class="text-center text-red-500 py-6">${res.message}</td></tr>`;
            }
        }).getDetailKumpulanTugas(idTugas);
    }

    function filterDetailNilaiTugas() {
        const searchInput = document.getElementById('searchNamaSiswa');
        const statusSelect = document.getElementById('filterStatusKumpul');
        
        if(!zState_detailKumpul) return;
        
        const searchVal = searchInput ? searchInput.value.toLowerCase() : "";
        const statusVal = statusSelect ? statusSelect.value : "Semua";
        
        zState_filteredKumpul = zState_detailKumpul.filter(d => {
            const matchName = d.nama.toLowerCase().includes(searchVal);
            const matchStatus = statusVal === "Semua" || d.status === statusVal;
            return matchName && matchStatus;
        });
        
        zState_pageNilaiDetail = 1;
        renderTabelDetailKumpul();
    }

    function renderTabelDetailKumpul() {
        const data = zState_filteredKumpul; 
        const tbody = document.getElementById('tabelNilaiDetailBody');
        const paginationContainer = document.getElementById('paginationNilaiDetail');
        
        if(zState_detailKumpul && zState_detailKumpul.length > 0) {
            const dTitle = document.getElementById('detTitleTugas');
            if(dTitle) dTitle.innerHTML = `Tugas: <span class="text-indigo-600">${zState_detailKumpul[0].tugasJudul}</span> - Kelas ${zState_detailKumpul[0].kelas}`;
        }

        if(!data || data.length === 0) { 
            tbody.innerHTML = `<tr><td colspan="11" class="text-center py-8 text-slate-500"><i class="fa-solid fa-folder-open text-3xl mb-3 text-slate-300 block"></i> Tidak ada data yang sesuai dengan pencarian/filter.</td></tr>`; 
            paginationContainer.innerHTML = '';
            updateCheckAllCheckboxState();
            return; 
        }

        const startIndex = (zState_pageNilaiDetail - 1) * zState_limitNilaiDetail;
        const endIndex = startIndex + zState_limitNilaiDetail;
        const paginatedData = data.slice(startIndex, endIndex);

        tbody.innerHTML = paginatedData.map((d, i) => {
            const globalIndex = startIndex + i + 1;
            
            let badgeStatus = '';
            if(d.status === "Sudah Kumpul") badgeStatus = `<span class="bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-md text-[10px] font-bold border border-emerald-200">Lengkap</span>`;
            else if(d.status === "Kurang Lengkap") badgeStatus = `<span class="bg-yellow-50 text-yellow-600 px-2.5 py-1 rounded-md text-[10px] font-bold border border-yellow-200">Kurang</span>`;
            else badgeStatus = `<span class="bg-rose-50 text-rose-600 px-2.5 py-1 rounded-md text-[10px] font-bold border border-rose-200">Belum Kumpul</span>`;

            let nilaiHtml = d.nilai !== "" ? `<span class="font-black text-indigo-600 text-base">${d.nilai}</span>` : `<span class="text-slate-300 text-xs">-</span>`;
            let disableBtn = d.idKumpul === "" ? "disabled opacity-50 cursor-not-allowed" : "";
            
            let isChecked = zState_selectedKumpul.includes(d.idKumpul) ? 'checked' : '';
            let disableChk = d.idKumpul === "" ? "disabled opacity-50 cursor-not-allowed" : "cursor-pointer";

            return `
            <tr id="row-kumpul-${d.idKumpul}" class="hover:bg-indigo-50/30 transition-colors">
                <td class="px-3 py-2 text-center border-r border-slate-100 min-w-[60px]">
                    <input type="checkbox" style="appearance: auto; width: 16px; height: 16px;" class="cursor-pointer ${disableChk}" value="${d.idKumpul}" onchange="toggleSelectKumpul(this)" ${isChecked} ${d.idKumpul===''?'disabled':''}>
                </td>
                <td class="px-4 py-3 text-center border-r border-slate-100 font-medium">${globalIndex}</td>
                <td class="px-4 py-3 border-r border-slate-100 font-mono text-xs text-slate-500">${d.nis}</td>
                <td class="px-4 py-3 border-r border-slate-100 font-bold text-slate-800">${d.nama}</td>
                <td class="px-4 py-3 border-r border-slate-100 text-center text-xs font-bold text-slate-500">${d.kelas}</td>
                <td class="px-4 py-3 border-r border-slate-100 font-bold text-slate-800">${d.tugasJudul}</td>
                <td class="px-4 py-3 border-r border-slate-100 text-[10px] text-center text-slate-400">${formatTanggalTeks(d.waktuBuat)}</td>
                <td class="px-4 py-3 border-r border-slate-100 text-[10px] text-center font-bold ${d.waktuKumpul!=='-'?'text-indigo-600':'text-red-400'}">${formatTanggalTeks(d.waktuKumpul)}</td>
                <td class="px-4 py-3 text-center border-r border-slate-100">${badgeStatus}</td>
                <td class="px-4 py-3 text-center border-r border-slate-100 bg-slate-50/50">${nilaiHtml}</td>
                <td class="px-4 py-3 text-center">
                    <button ${disableBtn} onclick="bukaModalKoreksi('${d.id_user}')" class="bg-indigo-100 hover:bg-indigo-600 text-indigo-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-sm">Koreksi</button>
                </td>
            </tr>`;
        }).join('');

        renderPaginationControls(data.length);
        updateCheckAllCheckboxState();
    }

    function toggleSelectKumpul(cb) {
        if(cb.checked) {
            if(!zState_selectedKumpul.includes(cb.value)) zState_selectedKumpul.push(cb.value);
        } else {
            zState_selectedKumpul = zState_selectedKumpul.filter(id => id !== cb.value);
        }
        document.getElementById('lblCountBtnMassal').innerText = zState_selectedKumpul.length;
        updateCheckAllCheckboxState();
    }

    function toggleSelectAllKumpul(cb) {
        zState_filteredKumpul.forEach(d => {
            if(d.idKumpul !== "") {
                if(cb.checked) {
                    if(!zState_selectedKumpul.includes(d.idKumpul)) zState_selectedKumpul.push(d.idKumpul);
                } else {
                    zState_selectedKumpul = zState_selectedKumpul.filter(id => id !== d.idKumpul);
                }
            }
        });
        document.getElementById('lblCountBtnMassal').innerText = zState_selectedKumpul.length;
        renderTabelDetailKumpul(); 
    }

    function updateCheckAllCheckboxState() {
        const selectAll = document.getElementById('chkSelectAllKumpul');
        if(!selectAll) return;
        
        let allFilteredHaveId = zState_filteredKumpul.filter(d => d.idKumpul !== "");
        if(allFilteredHaveId.length === 0) {
            selectAll.checked = false;
            return;
        }
        
        let isAllSelected = allFilteredHaveId.every(d => zState_selectedKumpul.includes(d.idKumpul));
        selectAll.checked = isAllSelected;
    }

    function renderPaginationControls(totalItems) {
        const totalPages = Math.ceil(totalItems / zState_limitNilaiDetail);
        const container = document.getElementById('paginationNilaiDetail');

        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        const startIndex = (zState_pageNilaiDetail - 1) * zState_limitNilaiDetail + 1;
        const endIndex = Math.min(startIndex + zState_limitNilaiDetail - 1, totalItems);

        let btnHtml = `
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between w-full">
            <div>
                <p class="text-sm text-slate-700">
                    Menampilkan <span class="font-medium">${startIndex}</span> sampai <span class="font-medium">${endIndex}</span> dari <span class="font-medium">${totalItems}</span> data
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                    <button onclick="changePageNilaiDetail(${zState_pageNilaiDetail - 1})" ${zState_pageNilaiDetail === 1 ? 'disabled class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-300 bg-slate-50 text-sm font-medium text-slate-400 cursor-not-allowed"' : 'class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-300 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 transition-colors"'}>
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
            if (i === zState_pageNilaiDetail) {
                btnHtml += `<button aria-current="page" class="z-10 bg-indigo-50 border-indigo-500 text-indigo-600 relative inline-flex items-center px-4 py-2 border text-sm font-bold shadow-inner">${i}</button>`;
            } else {
                btnHtml += `<button onclick="changePageNilaiDetail(${i})" class="bg-white border-slate-300 text-slate-500 hover:bg-slate-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium transition-colors">${i}</button>`;
            }
        }

        btnHtml += `

    function getDriveDirectUrl(url) {
        if (!url) return '';
        let fileId = '';
        if (url.includes('/file/d/')) {
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) fileId = match[1];
        } else if (url.includes('id=')) {
            const match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) fileId = match[1];
        }
        if (fileId) {
            return `https://drive.google.com/uc?export=download&id=${fileId}`;
        }
        return url;
    }

    function convertToDrivePreviewUrl(url) {
        if (!url) return '';
        if (url.includes('drive.google.com/file/d/')) {
            return url.replace(/\/view.*$/, '/preview');
        }
        return url;
    }

            } else {

            }
        }).simpanNilaiTugas(payload);
    }

    async function submitSimpanNilaiMassal(e) {
        e.preventDefault();

        setBtnLoading('btnSimpanNilaiMassal', true, 'Menyimpan...');

        let successCount = 0;
        let failCount = 0;
        let lastError = '';

        const chunkSize = 5;
        for (let i = 0; i < zState_selectedKumpul.length; i += chunkSize) {
            const chunk = zState_selectedKumpul.slice(i, i + chunkSize);
            const promises = chunk.map(idK => {
                return new Promise((resolve) => {
                    const elNilai = document.getElementById('massal_nilai_' + idK);
                    const elCatatan = document.getElementById('massal_catatan_' + idK);
                    
                    const nilaiVal = elNilai ? elNilai.value : '';
                    const catatanVal = elCatatan ? elCatatan.value : '';

                    const singlePayload = { idKumpul: idK, nilai: nilaiVal, catatan: catatanVal };
                    google.script.run
                        .withSuccessHandler(res => {
                            if(res.status === 'success') {
                                let d = zState_detailKumpul.find(x => x.idKumpul === idK);
                                if(d) { d.nilai = nilaiVal; d.catatan = catatanVal; }
                                resolve({success: true});
                            } else {
                                resolve({success: false, msg: res.message});
                            }
                        })
                        .withFailureHandler(err => resolve({success: false, msg: err.message}))
                        .simpanNilaiTugas(singlePayload); 
                });
            });

            const results = await Promise.all(promises);
            results.forEach(r => {
                if(r.success) successCount++;
                else { failCount++; lastError = r.msg; }
            });
        }

        setBtnLoading('btnSimpanNilaiMassal', false, 'Simpan Semua Nilai');

        if (successCount > 0) {
            closeModalKoreksiMassal();
            showToast('success', failCount > 0 ? `Berhasil menyimpan ${successCount} siswa, Gagal ${failCount}.` : 'Semua nilai berhasil disimpan!');
            
            zState_selectedKumpul = []; 
            document.getElementById('lblCountBtnMassal').innerText = '0';
            if(document.getElementById('chkSelectAllKumpul')) document.getElementById('chkSelectAllKumpul').checked = false;
            
            filterDetailNilaiTugas(); 
            
            // Perbarui cache Nilai
            zCache_tugasNilaiLoaded = false;
            prefetchModulData();
        } else {
            showToast('error', lastError || 'Terjadi kesalahan saat menyimpan.');
        }
    }
