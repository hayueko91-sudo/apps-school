<script>
        /**
         * ZettBOT Safe Executor
         * Membantu memanggil fungsi Apps Script backend secara aman dengan mendukung berbagai alternatif nama/casing.
         * Mencegah crash satu fungsi menghentikan pemrosesan fungsi lainnya (Anti-Regression).
         */
        function safeRun(possibleNames, successHandler, errorHandler, ...args) {
            let foundName = null;
            
            // Mencari nama fungsi yang tersedia secara dinamis pada google.script.run
            for (let name of possibleNames) {
                if (typeof google !== 'undefined' && google.script && google.script.run && typeof google.script.run[name] === 'function') {
                    foundName = name;
                    break;
                }
            }

            if (foundName) {
                console.log(`ZettBOT Info: Memanggil fungsi server '${foundName}'`);
                try {
                    google.script.run
                        .withSuccessHandler(successHandler)
                        .withFailureHandler(err => {
                            console.error(`ZettBOT Error pada fungsi ${foundName}:`, err);
                            if (errorHandler) errorHandler(err);
                        })
                        [foundName](...args);
                } catch (e) {
                    console.error(`ZettBOT Exception saat mengeksekusi ${foundName}:`, e);
                    if (errorHandler) errorHandler(e);
                }
            } else {
                const errorMsg = `ZettBOT Error: Fungsi server [${possibleNames.join(', ')}] tidak ditemukan di Code.gs.`;
                console.error(errorMsg);
                if (errorHandler) errorHandler(new Error(errorMsg));
            }
        }

        function renderDesktopMenu() {
            let html = '';
            appMenus.forEach((m, i) => {
                if (m.type === 'link') html += `<a href="#" id="desk-${m.id}" onclick="setMenuState('${m.id}', 'link'); ${m.action}" class="desktop-menu-item ${i===0?'active':''} flex items-center gap-3 px-3 py-2.5 rounded-xl mb-1 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all"><i class="fa-solid ${m.icon} w-5 text-center"></i> ${m.label}</a>`;
                else if (m.type === 'accordion') {
                    html += `<div><button onclick="toggleAccordion('${m.id}', false)" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl mb-1 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all"><div class="flex items-center gap-3"><i class="fa-solid ${m.icon} w-5 text-center"></i> ${m.label}</div><i class="fa-solid fa-chevron-right text-xs transition-transform" id="icon-desk-${m.id}"></i></button><div id="acc-desk-${m.id}" class="hidden flex-col pl-9 space-y-1 mb-2 border-l-2 border-slate-100 ml-5">`;
                    m.subs.forEach(s => { html += `<a href="#" id="desk-sub-${s.id}" onclick="setMenuState('${s.id}', 'sub'); ${s.action}" class="desktop-submenu-item block px-3 py-2 rounded-lg text-sm text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">${s.label}</a>`; });
                    html += `</div></div>`;
                }
            });
            document.getElementById('sidebarMenu').innerHTML = html;
        }

        function renderMobileMenu() {
            const role = currentUser.role.toLowerCase();
            let navHtml = '';
            if (role === 'admin' || role === 'guru') {
                navHtml += `<button id="mob-dash" onclick="setMenuState('dash', 'link'); loadDashboard()" class="mobile-nav-item active text-indigo-600 flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-semibold">Dashboard</span></button>`;
                navHtml += `<button onclick="openSheetAndToggle('mat')" class="mobile-nav-item text-slate-400 flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid fa-book-bookmark text-xl mb-1"></i><span class="text-[10px] font-semibold">Materi</span></button>`;
                navHtml += `<button onclick="openSheetAndToggle('lms')" class="mobile-nav-item text-slate-400 flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid fa-chalkboard-user text-xl mb-1"></i><span class="text-[10px] font-semibold">LMS</span></button>`;
                navHtml += `<button onclick="openMobileMore()" class="mobile-nav-item text-slate-400 flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid fa-bars text-xl mb-1"></i><span class="text-[10px] font-semibold">Menu</span></button>`;
            } else {
                appMenus.slice(0, 3).forEach((m, i) => { navHtml += `<button id="mob-${m.id}" onclick="setMenuState('${m.id}', 'link'); ${m.action}" class="mobile-nav-item ${i===0?'active text-indigo-600':'text-slate-400'} flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid ${m.icon} text-xl mb-1"></i><span class="text-[10px] font-semibold">${m.label}</span></button>`; });
                if(appMenus.length > 3) navHtml += `<button onclick="openMobileMore()" class="mobile-nav-item text-slate-400 flex flex-col items-center justify-center p-2 w-16"><i class="fa-solid fa-bars text-xl mb-1"></i><span class="text-[10px] font-semibold">Lainnya</span></button>`;
            }
            document.getElementById('mobileBottomNav').innerHTML = navHtml;

            let sheetHtml = '';
            appMenus.forEach(m => {
                if(m.type === 'link') { if(m.id !== 'dash') sheetHtml += `<button onclick="setMenuState('${m.id}', 'sheet-link'); ${m.action}; closeMobileMore();" class="w-full flex items-center gap-4 px-4 py-3 bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-2xl mb-2 text-left"><div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-indigo-600"><i class="fa-solid ${m.icon}"></i></div><span class="font-bold text-slate-700">${m.label}</span></button>`; } 
                else if (m.type === 'accordion') {
                    sheetHtml += `<div class="mb-2"><button onclick="toggleAccordion('${m.id}', true)" class="w-full flex items-center justify-between px-4 py-3 bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-2xl text-left transition-all"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-indigo-600 shadow-sm"><i class="fa-solid ${m.icon}"></i></div><span class="font-bold text-slate-700">${m.label}</span></div><i class="fa-solid fa-chevron-right text-slate-400 transition-transform" id="icon-mob-${m.id}"></i></button><div id="acc-mob-${m.id}" class="hidden flex-col pl-16 pr-4 py-2 space-y-1">`;
                    m.subs.forEach(s => { sheetHtml += `<a href="#" onclick="setMenuState('${s.id}', 'sheet-sub'); ${s.action}; closeMobileMore();" class="block py-2.5 text-sm font-medium text-slate-500 hover:text-indigo-600 border-b border-slate-100 last:border-0">${s.label}</a>`; });
                    sheetHtml += `</div></div>`;
                }
            });
            if(sheetHtml === '') sheetHtml = `<div class="text-center text-sm text-slate-400 py-2">Semua menu tersedia di bawah.</div>`;
            document.getElementById('mobileMoreContent').innerHTML = sheetHtml;
        }

        function toggleAccordion(id, isMobile = false) {
            const prefix = isMobile ? 'mob-' : 'desk-';
            const content = document.getElementById(`acc-${prefix}${id}`);
            const icon = document.getElementById(`icon-${prefix}${id}`);
            if (content.classList.contains('hidden')) { content.classList.remove('hidden'); content.classList.add('flex'); icon.classList.add('rotate-90'); } 
            else { content.classList.add('hidden'); content.classList.remove('flex'); icon.classList.remove('rotate-90'); }
        }

        function setMenuState(id, type) {
            document.querySelectorAll('.desktop-menu-item').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.desktop-submenu-item').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.mobile-nav-item').forEach(e => { e.classList.remove('active','text-indigo-600'); e.classList.add('text-slate-400'); });

            if (type === 'link' || type === 'sheet-link') { if(document.getElementById(`desk-${id}`)) document.getElementById(`desk-${id}`).classList.add('active'); } 
            else if (type === 'sub' || type === 'sheet-sub') { if(document.getElementById(`desk-sub-${id}`)) document.getElementById(`desk-sub-${id}`).classList.add('active'); }

            if (type === 'link' && document.getElementById(`mob-${id}`)) document.getElementById(`mob-${id}`).classList.add('active','text-indigo-600');
            else if (type.includes('sheet') || type === 'sub') { const hamburger = document.querySelector('#mobileBottomNav button:last-child'); if(hamburger) hamburger.classList.add('active','text-indigo-600'); }
        }

        function openMobileMore() { document.getElementById('mobileMoreMenu').classList.remove('hidden'); requestAnimationFrame(() => { document.getElementById('mobileMoreBackdrop').classList.remove('opacity-0'); document.getElementById('mobileMoreSheet').classList.remove('translate-y-full'); }); }
        function closeMobileMore() { document.getElementById('mobileMoreBackdrop').classList.add('opacity-0'); document.getElementById('mobileMoreSheet').classList.add('translate-y-full'); setTimeout(() => document.getElementById('mobileMoreMenu').classList.add('hidden'), 300); }
        function openSheetAndToggle(accordionId) { openMobileMore(); setTimeout(() => { const content = document.getElementById(`acc-mob-${accordionId}`); if(content && content.classList.contains('hidden')) { toggleAccordion(accordionId, true); } }, 300); }

        function loadDashboard() {
            if(currentUser.role.toLowerCase() === 'admin') loadModule('admin-dash');
            else if(currentUser.role.toLowerCase() === 'guru') loadModule('guru-dash');
            else loadModule('siswa-dash');
        }

        function loadModule(modName) {
            renderTemplate('contentArea', `tpl-${modName}`);
            
            window.dispatchEvent(new CustomEvent('onLoadModule', { detail: modName }));
            
            try {
                if(modName === 'cbt-dashboard' && typeof initCBTDashboard === 'function') initCBTDashboard();
                if(modName === 'cbt-bank-soal' && typeof initCBTBankSoal === 'function') initCBTBankSoal();
                if(modName === 'cbt-jadwal' && typeof initCBTJadwal === 'function') initCBTJadwal();
                if(modName === 'cbt-monitoring' && typeof initCBTMonitoring === 'function') initCBTMonitoring();
                if(modName === 'cbt-hasil' && typeof initCBTHasil === 'function') initCBTHasil();

                if(modName === 'admin-dash' && typeof getAdminStats === 'function') getAdminStats();
                if(modName === 'siswa-quiz') { quizState = { currentQ: 1, answers: {} }; renderQuizUI(); }
                if(modName === 'siswa-dash' && typeof initSiswaDash === 'function') initSiswaDash();
                if(modName === 'admin-pengguna' && typeof fetchDataPengguna === 'function') fetchDataPengguna();
                if(modName === 'admin-tahun-ajaran' && typeof fetchDataTahunAjaran === 'function') fetchDataTahunAjaran();
                if(modName === 'admin-pengumuman' && typeof fetchDataPengumuman === 'function') fetchDataPengumuman();
                if(modName === 'admin-setting' && typeof fetchSettingAplikasi === 'function') fetchSettingAplikasi();
                
                if(modName === 'materi-ajar' && typeof initMateriAjar === 'function') initMateriAjar();
                
                if(modName === 'admin-id') initAdminIdCard();
                if(modName === 'lap-leger' && typeof initLaporanLeger === 'function') initLaporanLeger();
                if(modName === 'guru-dash') initGuruDash();

                if(modName === 'jadwal-guru' && typeof initJadwalGuru === 'function') initJadwalGuru();
                if(modName === 'admin-jurnal' && typeof initJurnal === 'function') initJurnal();

                if(modName === 'modul-tugas' && typeof initModulTugas === 'function') initModulTugas();
                if(modName === 'tugas-nilai' && typeof initTugasNilai === 'function') initTugasNilai();
                if(modName === 'modul-sumatif' && typeof initModulSumatif === 'function') initModulSumatif();

                if(modName === 'admin-absensi' && typeof initAbsensi === 'function') initAbsensi();
                if(modName === 'ref-guru' && typeof fetchDataGuru === 'function') fetchDataGuru();
                if(modName === 'ref-siswa' && typeof fetchDataSiswa === 'function') fetchDataSiswa();
                if(modName === 'ref-maping' && typeof fetchDataMaping === 'function') fetchDataMaping();
            } catch (err) { console.log("Module Error: " + err.message); }
        }

        // =========================================================================
        // ZettBOT Idea: ZERO-LOADING ASYNCHRONOUS DASHBOARD (GURU) WITH PROGRESS BAR
        // ==========================================

        window.cachedGuruDashboard = null;
        window.isFetchingGuruDashboard = false;

        // Berjalan di latar belakang (Silent Fetch & Update)
        function prefetchGuruDashboard(forceRefresh = false) {
            if (typeof currentUser !== 'undefined' && currentUser && currentUser.role && currentUser.role.toLowerCase() === 'guru') {
                if (window.isFetchingGuruDashboard && !forceRefresh) return; // Mencegah fetch tumpang tindih
                
                window.isFetchingGuruDashboard = true;
                
                safeRun(['getGuruDashboardData', 'getGuruDashboard'], 
                    res => {
                        window.isFetchingGuruDashboard = false;
                        Swal.close(); // PASTI DITUTUP AGAR TIDAK STUCK
                        
                        if(res && res.status === 'success' && res.data) {
                            window.cachedGuruDashboard = res.data;
                            if(document.getElementById('guruScheduleCards')) {
                                renderGuruScheduleCards(res.data);
                            }
                        } else {
                            if(document.getElementById('guruScheduleCards')) {
                                document.getElementById('guruScheduleCards').innerHTML = `<div class="col-span-full p-8 text-center text-red-500 bg-red-50 rounded-xl border border-red-100 shadow-sm">Gagal memuat jadwal: ${res ? res.message : 'Error server'}</div>`;
                            }
                        }
                    },
                    err => {
                        window.isFetchingGuruDashboard = false;
                        Swal.close(); // PASTI DITUTUP JIKA ERROR
                        if(document.getElementById('guruScheduleCards')) {
                            document.getElementById('guruScheduleCards').innerHTML = `<div class="col-span-full p-8 text-center text-red-500 bg-red-50 rounded-xl border border-red-100 shadow-sm">Koneksi terputus: ${err.message}</div>`;
                        }
                    },
                    currentUser
                );
            }
        }

        // Jalankan auto-prefetch saat pertama kali memuat halaman
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => prefetchGuruDashboard(false), 500);
        });

        // Auto update hanya ketika ada perubahan / user kembali fokus ke tab
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible' && document.getElementById('guruScheduleCards')) {
                prefetchGuruDashboard(true);
            }
        });

        function initGuruDash() {
            const welc = document.getElementById('guruWelcome');
            if(welc && currentUser) welc.innerText = `Selamat datang, ${currentUser.nama}!`;
            fetchGuruDashboard();
        }

        function fetchGuruDashboard() {
            const container = document.getElementById('guruScheduleCards');
            if(!container) return;

            // Jika cache ada, langsung tampilkan tanpa loading screen panjang
            if (window.cachedGuruDashboard) {
                renderGuruScheduleCards(window.cachedGuruDashboard);
                prefetchGuruDashboard(true); // Memperbarui data background diam-diam
            } else {
                // Jika cache kosong, tampilkan animasi loading baru fetch data
                container.innerHTML = ``; 
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'info',
                    title: 'Menyiapkan Kartu Jadwal...',
                    text: 'Mengambil data dari server',
                    showConfirmButton: false,
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });
                prefetchGuruDashboard(true);
            }
        }

        function renderGuruScheduleCards(data) {
            const container = document.getElementById('guruScheduleCards');
            const hariLabel = document.getElementById('hariIniLabel');
            if(!container) return;

            if(hariLabel) {
                // Generate tanggal hari ini dari sistem dan gabungkan dengan data hari database
                const now = new Date();
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                const tglFormat = now.toLocaleDateString('id-ID', options);
                hariLabel.innerText = `${data.hari}, ${tglFormat}`;
            }
            
            if(data.jadwalHariIni.length === 0) {
                container.innerHTML = `<div class="col-span-full p-8 text-center bg-white rounded-2xl border border-slate-100 shadow-sm animate-fade"><i class="fa-solid fa-mug-hot text-4xl text-slate-300 mb-3"></i><p class="text-slate-500 font-medium">Tidak ada jadwal mengajar untuk hari ini.</p></div>`;
                return;
            }

            container.innerHTML = data.jadwalHariIni.map(j => {
                // Menentukan apakah kartu ini dikunci karena sudah selesai
                let isCardDisabled = j.isDisabled || (j.absenDone && j.jurnalDone);

                // Tombol otomatis DISABLED (Terkunci) jika status absenDone/jurnalDone TRUE
                let absenBtnHtml = j.absenDone 
                    ? `<button disabled class="flex-1 bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 cursor-not-allowed shadow-sm transition-all"><i class="fa-solid fa-check-circle text-emerald-500 text-sm"></i> Absen Selesai</button>`
                    : `<button onclick='panggilInputDariJadwal(event, ${JSON.stringify(j).replace(/'/g, "&#39;")})' class="flex-1 bg-white hover:bg-indigo-600 text-slate-600 hover:text-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 shadow-sm group"><i class="fa-solid fa-clipboard-user text-indigo-500 group-hover:text-white transition-colors"></i> Absensi</button>`;
                    
                let jurnalBtnHtml = j.jurnalDone
                    ? `<button disabled class="flex-1 bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 cursor-not-allowed shadow-sm transition-all"><i class="fa-solid fa-check-double text-emerald-500 text-sm"></i> Jurnal Selesai</button>`
                    : `<button onclick='bukaJurnalDariJadwal(event, ${JSON.stringify(j).replace(/'/g, "&#39;")})' class="flex-1 bg-white hover:bg-blue-600 text-slate-600 hover:text-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 shadow-sm group"><i class="fa-solid fa-book-journal-whills text-blue-500 group-hover:text-white transition-colors"></i> Jurnal</button>`;

                let cardContainerClass = isCardDisabled
                    ? "bg-slate-50 border-slate-200 opacity-70 filter grayscale-[20%]"
                    : "bg-white border-slate-100 hover:shadow-md hover:-translate-y-1 transition-transform duration-300";

                return `
                <div class="rounded-2xl p-5 border shadow-sm relative overflow-hidden group animate-fade flex flex-col h-full ${cardContainerClass}">
                    <div class="absolute top-0 left-0 w-1.5 h-full ${isCardDisabled ? 'bg-emerald-500' : 'bg-indigo-500'}"></div>
                    <div class="flex justify-between items-start mb-3 pl-2">
                        <div>
                            <div class="text-[10px] font-black ${isCardDisabled ? 'text-emerald-500' : 'text-indigo-500'} uppercase tracking-wider mb-1">Jam ${j.jamMulai} - ${j.jamSelesai}</div>
                            <h4 class="text-xl font-bold text-slate-800 leading-tight">${j.kelas}</h4>
                        </div>
                        <span class="${isCardDisabled ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100'} px-2.5 py-1 rounded-lg text-[10px] font-bold border">${isCardDisabled ? 'Selesai' : (j.waktu || 'Tatap Muka')}</span>
                    </div>
                    <p class="text-xs text-slate-500 font-medium mb-5 flex items-center gap-2 pl-2"><i class="fa-solid fa-book text-slate-400"></i> ${j.mapel}</p>
                    <div class="flex items-center gap-2 mt-auto pt-4 border-t border-slate-50 pl-2">
                        ${absenBtnHtml}
                        ${jurnalBtnHtml}
                    </div>
                </div>`;
            }).join('');
        }

        // =========================================================================

        let globalDataIdCard = [];

        function initAdminIdCard() {
            const container = document.getElementById('idCardContainer');
            const dropdown = document.getElementById('filterKelasIdCard');
            
            if(dropdown) dropdown.disabled = true;

            google.script.run.withSuccessHandler(res => {
                if(res && res.status === 'success') {
                    globalDataIdCard = res.data;
                    
                    if(globalDataIdCard.length === 0) {
                        container.innerHTML = `<div class="col-span-full p-8 text-center bg-white rounded-2xl border border-slate-100 shadow-sm"><i class="fa-solid fa-users-slash text-4xl text-slate-300 mb-3"></i><p class="text-slate-500 font-bold">Tidak ada data siswa / akun yang ditemukan.</p></div>`;
                        if(dropdown) dropdown.innerHTML = `<option value="">Kosong</option>`;
                        return;
                    }

                    const kelasiSet = new Set(globalDataIdCard.map(item => item.kelas).filter(k => k));
                    const kelasiArr = Array.from(kelasiSet).sort();

                    if(dropdown) {
                        let optHtml = `<option value="ALL">Semua Kelas</option>`;
                        kelasiArr.forEach(k => {
                            optHtml += `<option value="${k}">${k}</option>`;
                        });
                        dropdown.innerHTML = optHtml;
                        dropdown.disabled = false;
                        
                        dropdown.value = kelasiArr.length > 0 ? kelasiArr[0] : "ALL";
                        renderIdCards(dropdown.value);
                    }

                } else {
                    container.innerHTML = `<div class="col-span-full p-6 text-center text-red-500 bg-red-50 rounded-2xl border border-slate-200">Gagal memuat data: ${res.message}</div>`;
                    if(dropdown) dropdown.innerHTML = `<option value="">Error</option>`;
                }
            }).getAkunSiswaUntukCetak();
        }

        function renderIdCards(selectedKelas) {
            const container = document.getElementById('idCardContainer');
            if(!container) return;

            let filteredData = selectedKelas === "ALL" 
                ? globalDataIdCard 
                : globalDataIdCard.filter(d => d.kelas === selectedKelas);

            if(filteredData.length === 0) {
                container.innerHTML = `<div class="col-span-full p-8 text-center bg-white rounded-2xl border border-slate-100 shadow-sm"><p class="text-slate-500 font-bold">Tidak ada akun di kelas ini.</p></div>`;
                return;
            }

            const appName = document.title || "EDUZETT SCHOOL";

            let html = filteredData.map(siswa => {
                return `
                <div class="print-card-wrapper bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-center items-center">
                    <div class="w-[280px] h-[420px] bg-gradient-to-b from-indigo-600 to-indigo-800 rounded-2xl overflow-hidden relative shadow-lg text-center text-white flex flex-col justify-between">
                        <div class="p-6 pb-2">
                            <h3 class="text-lg font-bold tracking-widest uppercase truncate">${appName}</h3>
                            <p class="text-[10px] text-indigo-200 uppercase">${siswa.kelas || 'Siswa'}</p>
                        </div>
                        <div class="my-auto px-6">
                            <div class="w-20 h-20 bg-white rounded-full mx-auto mb-3 border-4 border-indigo-300 flex items-center justify-center overflow-hidden">
                                <i class="fa-solid fa-user text-3xl text-slate-300"></i>
                            </div>
                            <h4 class="text-lg font-bold leading-tight truncate px-2" title="${siswa.nama}">${siswa.nama}</h4>
                            <p class="text-[10px] bg-indigo-500/50 inline-block px-3 py-1 rounded-full mt-2 font-semibold">NIS: ${siswa.nis}</p>
                        </div>
                        <div class="p-4 pt-0">
                            <div class="bg-white text-slate-800 p-3 rounded-xl text-left shadow-inner">
                                <div class="flex justify-between items-center mb-1">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold"><i class="fa-solid fa-user-circle mr-1"></i> Username</p>
                                </div>
                                <p class="text-sm font-bold mb-2 tracking-wide">${siswa.username}</p>
                                
                                <div class="flex justify-between items-center mb-1">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold"><i class="fa-solid fa-key mr-1"></i> Password</p>
                                </div>
                                <p class="text-sm font-bold tracking-wide">${siswa.password}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
        }

        let globalSiswaData = null; 
        let globalSiswaLMSList = []; 
        let globalMateriSiswaList = []; 
        
        function initSiswaDash() {
            const containerTugas = document.getElementById('siswaTugasContainer');

                let isYoutube = konten.includes('youtube.com') || konten.includes('youtu.be');
                let isDrive = konten.includes('drive.google.com');

                    previewHtml = `<img src="${konten}" class="w-full rounded-xl border border-slate-200 mb-4">`;

        /**
         * ZettBOT Checker: Memeriksa apakah jadwal modul LMS siswa sudah lewat waktu/tanggal.
         * Menggunakan perbandingan zona waktu lokal browser agar sinkron secara real-time.
         */
        function isScheduleOverdue(lms) {
            if (!lms.tanggal) return false; // Default: Tetap aktif jika data tanggal tidak terisi
            try {
                let tglStr = lms.tanggal; // format: 'yyyy-MM-dd'
                let jamSelesaiStr = "23:59";
                
                if (lms.jam_selesai) {
                    jamSelesaiStr = lms.jam_selesai.trim();
                } else if (lms.jam) {
                    let parts = lms.jam.split(' - ');
                    if (parts.length > 1) {
                        jamSelesaiStr = parts[1].trim();
                    }
                }
                
                let timeParts = jamSelesaiStr.split(':');
                let h = parseInt(timeParts[0] || 0, 10);
                let m = parseInt(timeParts[1] || 0, 10);
                
                let dateParts = tglStr.split('-');
                let year = parseInt(dateParts[0], 10);
                let month = parseInt(dateParts[1], 10) - 1;
                let day = parseInt(dateParts[2], 10);
                
                // Membuat object tanggal target sesuai zona waktu lokal user
                let targetDate = new Date(year, month, day, h, m, 0);
                
                if (!isNaN(targetDate.getTime())) {
                    return new Date() > targetDate;
                }
            } catch (e) {
                console.error("ZettBOT Error: Gagal memproses tanggal jatuh tempo LMS", e);
            }
            return false;
        }

                let dSelesai = parseTugasDate(t.selesai);

                let wktIconClass = (isOverdue && !t.kumpul) ? 'text-rose-500' : 'text-red-400';

                    if (t.isLengkap) {
                        statusBadge = `<div class="mb-3"><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-bold shadow-sm"><i class="fa-solid fa-circle-check"></i> Jawaban Lengkap</span></div>`;
                    } else {
                        statusBadge = `<div class="mb-3"><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-rose-50 text-rose-700 border border-rose-200 text-[10px] font-bold shadow-sm"><i class="fa-solid fa-triangle-exclamation"></i> Belum Lengkap</span></div>`;
                    }

                        <span class="text-[10px] font-bold text-indigo-700 bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-md uppercase tracking-wide">${t.mapel}</span>

        function bukaDetailTugasSiswa(id) {
            let tgs = globalSiswaData.tugas.find(t => t.id === id);
            if(!tgs) return;
            
            let dSelesai = parseTugasDate(tgs.selesai);
            let isOverdue = dSelesai && new Date() > dSelesai;
            
            renderTemplate('contentArea', 'tpl-siswa-tugas-detail');
            
            document.getElementById('detTugasMapel').innerText = tgs.mapel;
            document.getElementById('detTugasJudul').innerText = tgs.judul;
            document.getElementById('detTugasGuru').innerText = `Diberikan Oleh: ${tgs.guru}`;
            
            document.getElementById('detTugasWaktu').innerText = dSelesai ? dSelesai.toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
            
            document.getElementById('detTugasDeskripsi').innerText = tgs.deskripsi || tgs.instruksi || '-';
            
            if(tgs.fotoInstruksi) {
                document.getElementById('detTugasFoto').src = tgs.fotoInstruksi;
                document.getElementById('detTugasFotoContainer').classList.remove('hidden');
            }

            const formContainer = document.getElementById('formKumpulContainer');
            const statusContainer = document.getElementById('statusKumpulContainer');
            
            if(tgs.kumpul) {
                formContainer.classList.add('hidden');
                statusContainer.classList.remove('hidden');
                
                let dKumpul = tgs.kumpul;
                document.getElementById('statTglKumpul').innerText = new Date(dKumpul.tglKumpul).toLocaleString('id-ID', {day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'});
                document.getElementById('statNilai').innerText = dKumpul.nilai !== '' ? dKumpul.nilai : 'Proses';

                let titleKekurangan = document.getElementById('statKekuranganTitle');
                let descKekurangan = document.getElementById('statKekurangan');
                
                if(containerKekurangan) {

                    if(!tgs.isLengkap) {
                        containerKekurangan.className = "col-span-full bg-rose-50 rounded-2xl p-5 border border-rose-200 shadow-sm";
                        if(titleKekurangan) {
                            titleKekurangan.className = "text-xs text-rose-600 font-bold uppercase tracking-wider mb-1 flex items-center gap-1.5";
                            titleKekurangan.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-rose-500 text-sm"></i> Peringatan Sistem: Lampiran Kurang';
                        }
                        if(descKekurangan) {
                            descKekurangan.className = "text-sm text-rose-700 font-medium";
                            descKekurangan.innerText = tgs.infoKekurangan ? `Anda belum melampirkan file: ${tgs.infoKekurangan}` : "Ada komponen tugas yang belum dilampirkan.";
                        }
                    } else {
                        containerKekurangan.className = "col-span-full bg-emerald-50 rounded-2xl p-5 border border-emerald-200 shadow-sm";
                        if(titleKekurangan) {
                            titleKekurangan.className = "text-xs text-emerald-600 font-bold uppercase tracking-wider mb-1 flex items-center gap-1.5";
                            titleKekurangan.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500 text-sm"></i> Informasi Sistem: Tugas Lengkap';
                        }
                        if(descKekurangan) {
                            descKekurangan.className = "text-sm text-emerald-700 font-medium";
                            descKekurangan.innerText = "Bagus! Anda telah melampirkan seluruh jenis jawaban yang diminta oleh guru.";
                        }
                    }
                }

                let jawabHtml = '';
                if(dKumpul.teks) jawabHtml += `<div class="bg-white p-3 rounded-xl border border-slate-200"><span class="text-[10px] font-bold text-indigo-500 uppercase block mb-1">Teks:</span><p class="text-sm text-slate-700 whitespace-pre-wrap">${dKumpul.teks}</p></div>`;
                if(dKumpul.foto) jawabHtml += `<div class="bg-white p-3 rounded-xl border border-slate-200"><span class="text-[10px] font-bold text-indigo-500 uppercase block mb-1">Foto:</span><img src="${dKumpul.foto}" class="max-w-[200px] rounded-lg border border-slate-100"></div>`;
                if(dKumpul.video && (dKumpul.video.includes('http') || dKumpul.video.includes('drive'))) jawabHtml += `<div class="bg-white p-3 rounded-xl border border-slate-200"><span class="text-[10px] font-bold text-indigo-500 uppercase block mb-1">Video:</span><a href="${dKumpul.video}" target="_blank" class="text-sm text-blue-600 hover:underline font-medium"><i class="fa-solid fa-link"></i> Buka Video di Drive</a></div>`;
                if(dKumpul.file && (dKumpul.file.includes('http') || dKumpul.file.includes('drive'))) jawabHtml += `<div class="bg-white p-3 rounded-xl border border-slate-200"><span class="text-[10px] font-bold text-indigo-500 uppercase block mb-1">Dokumen:</span><a href="${dKumpul.file}" target="_blank" class="text-sm text-rose-600 hover:underline font-medium"><i class="fa-solid fa-file-pdf"></i> Buka Dokumen di Drive</a></div>`;
                if(!jawabHtml) jawabHtml = '<div class="text-sm text-slate-500 italic">Tidak ada jawaban terlampir.</div>';
                
                let containerJawaban = document.getElementById('statJawabanSiswaContainer');
                if(containerJawaban) containerJawaban.innerHTML = jawabHtml;

                document.getElementById('statCatatan').innerHTML = catatanGuru;

                formContainer.classList.remove('hidden');

                if(jns.includes('foto')) document.getElementById('inpFotoContainer').classList.remove('hidden');
                if(jns.includes('video')) document.getElementById('inpVideoContainer').classList.remove('hidden');

                document.getElementById('inpSiswaKelas').value = globalSiswaData.kelas;

                document.getElementById('inpJenisTugas').value = tgs.jenisTugas || 'teks';

                let reqNames = jns.map(j => reqMap[j]).filter(Boolean);

                        msgHTML += `<div class="mb-2 text-rose-700 border-b border-rose-200 pb-2"><i class="fa-solid fa-clock-rotate-left mr-1"></i> <b>Peringatan:</b> Batas waktu pengumpulan tugas ini telah lewat.</div>`;
                    }
                    if(reqNames.length > 0) {
                        msgHTML += `<div class="mt-2"><i class="fa-solid fa-circle-exclamation mr-1"></i> <b>Wajib Dilengkapi:</b> ${reqNames.join(', ')}</div>`;

                        infoDiv.innerHTML = msgHTML;
                        infoDiv.classList.remove('hidden');
                    } else {
                        infoDiv.classList.add('hidden');
                    }
                }
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function toBase64AndCompress(file, maxDimension) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxDimension) { height *= maxDimension / width; width = maxDimension; } } 
                        else { if (height > maxDimension) { width *= maxDimension / height; height = maxDimension; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    }
                    img.onerror = () => reject('Gagal memproses gambar');
                };
                reader.onerror = error => reject(error);
            });
        }

        async function submitJawabanSiswa(e) {
            e.preventDefault();
            
            const jenisTugasVal = document.getElementById('inpJenisTugas').value;
            const requiredTypes = jenisTugasVal ? jenisTugasVal.split(',') : ['teks'];
            let missing = [];
            
            if(requiredTypes.includes('teks') && !document.getElementById('inpTeksJawaban').value.trim()) missing.push('Jawaban Teks');
            
            const fileFoto = document.getElementById('inpFotoJawaban') && document.getElementById('inpFotoJawaban').files.length > 0 ? document.getElementById('inpFotoJawaban').files[0] : null;
            if(requiredTypes.includes('foto') && !fileFoto) missing.push('Upload Foto');

            const fileVideo = document.getElementById('inpVideoJawaban') && document.getElementById('inpVideoJawaban').files.length > 0 ? document.getElementById('inpVideoJawaban').files[0] : null;
            if(requiredTypes.includes('video') && !fileVideo) missing.push('Upload Video');

            const fileDokumen = document.getElementById('inpFileJawaban') && document.getElementById('inpFileJawaban').files.length > 0 ? document.getElementById('inpFileJawaban').files[0] : null;
            if(requiredTypes.includes('file') && !fileDokumen) missing.push('Upload Dokumen');

            if(missing.length > 0) {
                return Swal.fire('Tugas Belum Lengkap', 'Anda belum melampirkan/mengisi komponen tugas yang diwajibkan guru:<br><br><b>' + missing.join(', ') + '</b><br><br>Silakan lengkapi terlebih dahulu untuk mengirim jawaban.', 'warning');
            }

            const payload = {
                idTugas: document.getElementById('inpTugasId').value,
                nis: document.getElementById('inpSiswaNis').value,
                kelas: document.getElementById('inpSiswaKelas').value,
                teks: document.getElementById('inpTeksJawaban') ? document.getElementById('inpTeksJawaban').value : "",
            };

            setBtnLoading('btnKumpulTugas', true, 'Mengunggah & Mengirim...');

            try {
                const fileFoto = document.getElementById('inpFotoJawaban') && document.getElementById('inpFotoJawaban').files.length > 0 ? document.getElementById('inpFotoJawaban').files[0] : null;
                if(fileFoto) payload.fotoBase64 = await toBase64AndCompress(fileFoto, 600);

                const fileVideo = document.getElementById('inpVideoJawaban') && document.getElementById('inpVideoJawaban').files.length > 0 ? document.getElementById('inpVideoJawaban').files[0] : null;
                if(fileVideo) { 
                    payload.videoBase64 = await fileToBase64(fileVideo); 
                    payload.videoMime = fileVideo.type; 
                    payload.videoName = fileVideo.name; 
                }

                const fileDokumen = document.getElementById('inpFileJawaban') && document.getElementById('inpFileJawaban').files.length > 0 ? document.getElementById('inpFileJawaban').files[0] : null;
                if(fileDokumen) { 
                    payload.fileBase64 = await fileToBase64(fileDokumen); 
                    payload.fileMime = fileDokumen.type; 
                    payload.fileName = fileDokumen.name; 
                }

                google.script.run.withSuccessHandler(res => {
                    setBtnLoading('btnKumpulTugas', false, 'Kirim Jawaban');
                    if(res.status === 'success') {
                        window.cachedGuruDashboard = null;
                        Swal.fire({icon: 'success', title: 'Terkirim!', text: res.message, timer: 2000, showConfirmButton: false});
                        setTimeout(() => loadDashboard(), 1500); 
                    } else {
                        Swal.fire('Gagal', res.message, 'error');
                    }
                }).submitJawabanTugasSiswa(payload, currentUser);

            } catch(err) {
                setBtnLoading('btnKumpulTugas', false, 'Kirim Jawaban');
                Swal.fire('Error File', err.message || err, 'error');
            }
        }

        function getKekuranganTugasHTML(jenisTugasStr, dataKumpul) {
            if(!jenisTugasStr || !dataKumpul) return '';
            let jns = jenisTugasStr.split(',');
            let missingKumpul = [];
            if(jns.includes('teks') && (!dataKumpul.teks || dataKumpul.teks.trim() === '')) missingKumpul.push('Teks');
            if(jns.includes('foto') && !dataKumpul.foto) missingKumpul.push('Foto');
            if(jns.includes('video') && !dataKumpul.video) missingKumpul.push('Video');
            if(jns.includes('file') && !dataKumpul.file) missingKumpul.push('Dokumen');
            
            if(missingKumpul.length > 0) {
                return `<div class="mb-4 text-rose-600 font-bold bg-rose-50 p-3 rounded-xl border border-rose-100 text-xs"><i class="fa-solid fa-triangle-exclamation"></i> Peringatan: Siswa ini belum melampirkan komponen berikut: ${missingKumpul.join(', ')}</div>`;
            }
            return '';
        }
