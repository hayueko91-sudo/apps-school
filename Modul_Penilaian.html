        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex-1 flex flex-col min-h-0 relative">
            <div class="overflow-x-auto overflow-y-auto flex-1 w-full custom-scrollbar">
                <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
                    <thead class="sticky top-0 z-10 bg-indigo-50 shadow-sm" id="lapTHead">
                        <!-- Header dinamis dimuat di sini -->
                    </thead>
                    <tbody id="lapTBody" class="text-sm divide-y divide-slate-100">
                        <!-- Data laporan dimuat di sini -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</template>

<script>
        // =======================================================================
        // OPTIMIZED FRONTEND SCRIPT (Fast Rendering & State Management)
        // =======================================================================
        
        // 1. GLOBAL GETTERS: Menggunakan getter dinamis untuk mencegah bug kosong saat sistem baru dimuat
        function getUserRole() {
            return (typeof currentUser !== 'undefined' && currentUser.role) ? currentUser.role.toLowerCase() : '';
        }
        function getUserName() {
            return (typeof currentUser !== 'undefined' && currentUser.nama) ? currentUser.nama : '';
        }

        // Self-Healing Dependencies
        (function() {
            if (typeof Swal === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/sweetalert2@11';
                document.head.appendChild(script);
            }
            const faExists = Array.from(document.styleSheets).some(sheet => sheet.href && (sheet.href.includes('font-awesome') || sheet.href.includes('all.min.css')));
            if (!faExists) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
                document.head.appendChild(link);
            }
        })();

        // Cached Swal instance for faster modal calls
        let cachedSwal = null;
        function safeSwal() {
            if (cachedSwal) return cachedSwal;
            if (typeof Swal !== 'undefined') { cachedSwal = Swal; return Swal; }
            return null;
        }

        // Custom UI Handlers (Toast & Loading)
        let customLoadingEl = null;
        function showCustomToastFallback(message, type = 'info') {
            let container = document.getElementById('zett-notify-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'zett-notify-container';
                container.className = 'fixed top-4 right-4 z-[9999] flex flex-col gap-2 max-w-sm w-full pointer-events-none px-4';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg border text-sm font-medium transition-all duration-300 transform translate-x-12 opacity-0 pointer-events-auto flex flex-col gap-1 relative overflow-hidden ${
                type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
                type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                'bg-slate-50 border-slate-200 text-slate-800'
            }`;
            const icons = { success: 'fa-circle-check text-emerald-500', error: 'fa-circle-xmark text-rose-500', warning: 'fa-triangle-exclamation text-amber-500', info: 'fa-circle-info text-indigo-500' };
            toast.innerHTML = `<div class="flex items-center"><i class="fa-solid ${icons[type] || icons.info} mr-2"></i><span>${message}</span></div><div class="absolute bottom-0 left-0 h-1 bg-current opacity-30 transition-all ease-linear" style="width: 100%; transition-duration: 3000ms;"></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-12', 'opacity-0'); const bar = toast.querySelector('div:last-child'); if(bar) bar.style.width = '0%'; }, 10);
            setTimeout(() => { toast.classList.add('translate-x-12', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showCustomLoadingFallback(title) {
            let container = document.getElementById('zett-notify-container') || Object.assign(document.createElement('div'), {id: 'zett-notify-container', className: 'fixed top-4 right-4 z-[9999] flex flex-col gap-2 max-w-sm w-full pointer-events-none px-4'});
            if(!container.parentNode) document.body.appendChild(container);
            if (customLoadingEl) customLoadingEl.remove();
            customLoadingEl = document.createElement('div');
            customLoadingEl.className = 'p-4 rounded-xl shadow-lg border text-sm font-medium bg-indigo-50 border-indigo-200 text-indigo-800 pointer-events-auto flex items-center gap-3 transition-all duration-300';
            customLoadingEl.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-2 border-indigo-600 border-t-transparent"></div><span>${title}</span>`;
            container.appendChild(customLoadingEl);
        }
        function hideCustomLoadingFallback() { if (customLoadingEl) { customLoadingEl.remove(); customLoadingEl = null; } }

        const ZettNotify = {
            fire: function(opt) {
                const sw = safeSwal();
                if (sw) sw.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true, didOpen: (t) => { t.addEventListener('mouseenter', sw.stopTimer); t.addEventListener('mouseleave', sw.resumeTimer); } }).fire(opt);
                else showCustomToastFallback(opt.text || opt.title, opt.icon || 'info');
            }
        };

        let currentLoadingToast = null;
        function showLoadingToast(title = 'Sedang memproses...') {
            const sw = safeSwal();
            if (sw) { currentLoadingToast = sw.fire({ toast: true, position: 'top-end', showConfirmButton: false, timerProgressBar: false, title: title, didOpen: () => sw.showLoading() }); }
            else showCustomLoadingFallback(title);
        }
        function closeLoadingToast() {
            const sw = safeSwal();
            if (sw && sw.isLoading()) sw.close(); currentLoadingToast = null;
            if (!sw) hideCustomLoadingFallback();
        }
        function setBtnLoading(btnId, isLoading, defaultText) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            if (isLoading) { btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-1"></i> <span>Memproses...</span>`; }
            else { btn.disabled = false; btn.innerHTML = defaultText; }
        }

        // ==========================================
        // UTILITIES
        // ==========================================
        function getActiveTAAndSemester() {
            const today = new Date(); const y = today.getFullYear(); const m = today.getMonth();
            return m >= 6 ? { ta: y + "/" + (y + 1), semester: "Ganjil" } : { ta: (y - 1) + "/" + y, semester: "Genap" };
        }
        function setSelectedOptionOrCreate(selEl, val) {
            if (!selEl) return;
            if (!Array.from(selEl.options).some(o => o.value === val)) selEl.add(new Option(val, val));
            selEl.value = val;
        }
        function toggleFilter(bodyId, iconId) {
            const b = document.getElementById(bodyId), i = document.getElementById(iconId);
            if(b && i) { b.classList.toggle('hidden'); b.classList.toggle('flex'); i.classList.toggle('rotate-180'); }
        }

        // =======================================================================
        // STATE MANAGEMENT & SILENT PRELOADER
        // =======================================================================
        let isDataPreloaded = false, isPreloading = false, preloadCallbacks = [];
        let globalBobotData = [], globalSiswaPraktek = [], globalNilaiMap = {}, globalPraktekKategoriList = [];
        let lapBobot = [], lapSiswa = [], lapNilai = [];
        let globalGuruList = [], globalMapingGuru = {}, globalMapingMapel = {};
        let targetNisModal = '', targetKelasModal = '', targetNamaModal = '', isMasalModal = false;
        let globalCheckedPraktek = new Set();

        function preloadAllData(callback) {
            if (callback) preloadCallbacks.push(callback);
            if (isDataPreloaded) { while(preloadCallbacks.length) preloadCallbacks.shift()(); return; }
            if (isPreloading) return;
            isPreloading = true;

            google.script.run
            .withFailureHandler(err => {
                isPreloading = false; console.error("Prefetch error: ", err.message);
                while(preloadCallbacks.length) preloadCallbacks.shift()();
            })
            .withSuccessHandler(res => {
                isPreloading = false;
                if (res && res.status === 'success') {
                    const d = res.data;
                    globalBobotData = lapBobot = d.bobot || [];
                    globalSiswaPraktek = lapSiswa = d.siswa || [];
                    lapNilai = d.nilai || [];
                    globalGuruList = d.mapingGuru ? (d.mapingGuru.guruList || []) : [];
                    globalMapingGuru = d.mapingGuru ? (d.mapingGuru.maping || {}) : {};
                    globalMapingMapel = d.mapingGuru ? (d.mapingGuru.mapingMapel || {}) : {};
                    isDataPreloaded = true;
                }
                while(preloadCallbacks.length) preloadCallbacks.shift()();
            }).getLaporanPenilaianRelasi(getUserRole(), getUserName());
        }

        window.addEventListener('onLoadModule', (e) => {
            const m = e.detail;
            try {
                if (m === 'penilaian-bobot' && typeof initPenilaianBobot === 'function') initPenilaianBobot();
                if (m === 'penilaian-praktek' && typeof initPenilaianPraktek === 'function') initPenilaianPraktek();
                if (m === 'penilaian-laporan' && typeof initPenilaianLaporan === 'function') initPenilaianLaporan();
            } catch (err) { console.error("Init Error: ", err.message); }
        });

        // ==========================================
        // BOBOT MODULE
        // ==========================================
        function bukaModalBobot() {
            document.getElementById('formBobot').reset();
            document.getElementById('bbId').value = '';
            document.querySelector('#modalBobot h3').innerHTML = `<i class="fa-solid fa-list-check mr-2 text-indigo-500"></i>Atur Bobot Materi`;
            document.getElementById('btnSimpanBobot').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> <span>Simpan Bobot</span>`;
            
            const active = getActiveTAAndSemester();
            document.getElementById('bbTa').value = active.ta;
            document.getElementById('bbSemester').value = active.semester;
            
            const selGuru = document.getElementById('bbGuru');
            if(getUserRole() === 'guru') {
                setSelectedOptionOrCreate(selGuru, getUserName());
                selGuru.disabled = true;
                selGuru.classList.add('bg-slate-100', 'cursor-not-allowed', 'text-slate-500');
            } else { 
                selGuru.disabled = false; 
                selGuru.classList.remove('bg-slate-100', 'cursor-not-allowed', 'text-slate-500');
            }
            updateMapelDropdown(); 
            document.getElementById('modalBobot').classList.remove('hidden');
        }
        function tutupModalBobot() { document.getElementById('modalBobot').classList.add('hidden'); }
        function updateMapelDropdown() {
            const g = document.getElementById('bbGuru').value, sel = document.getElementById('bbMapel');
            if (!sel) return;
            sel.innerHTML = '<option value="">-- Pilih Mapel --</option>';
            if(g && globalMapingMapel[g]) globalMapingMapel[g].forEach(m => sel.add(new Option(m, m)));
        }
        function setupGuruSelectInModal() {
            const sel = document.getElementById('bbGuru');
            if(sel) {
                sel.innerHTML = '<option value="">-- Pilih Guru --</option>' + globalGuruList.map(g => `<option value="${g}">${g}</option>`).join('');
                if(getUserRole() === 'guru') { 
                    setSelectedOptionOrCreate(sel, getUserName());
                    sel.disabled = true; 
                    sel.classList.add('bg-slate-100', 'cursor-not-allowed', 'text-slate-500'); 
                    updateMapelDropdown(); 
                }
                else { 
                    sel.disabled = false; 
                    sel.classList.remove('bg-slate-100', 'cursor-not-allowed', 'text-slate-500'); 
                }
            }
        }
        function initPenilaianBobot() {
            const tbody = document.getElementById('tableBobotBody');
            if (!tbody) return;
            if (isDataPreloaded) { renderTableBobot(); setupGuruSelectInModal(); return; }
            tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4"><div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-600"></div></td></tr>';
            preloadAllData(() => { renderTableBobot(); setupGuruSelectInModal(); });
        }
        function editBobot(id) {
            const item = globalBobotData.find(b => b['ID'] === id); if(!item) return;
            document.getElementById('modalBobot').classList.remove('hidden');
            document.querySelector('#modalBobot h3').innerHTML = `<i class="fa-solid fa-pen-to-square mr-2 text-indigo-500"></i>Edit Bobot Materi`;
            document.getElementById('btnSimpanBobot').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> <span>Update Bobot</span>`;
            
            document.getElementById('bbId').value = item['ID'];
            document.getElementById('bbNama').value = item['Nama Materi'];
            
            const selGuru = document.getElementById('bbGuru');
            if(selGuru) {
                if(getUserRole() === 'guru') {
                    setSelectedOptionOrCreate(selGuru, getUserName());
                    selGuru.disabled = true;
                    selGuru.classList.add('bg-slate-100', 'cursor-not-allowed', 'text-slate-500');
                } else {
                    setSelectedOptionOrCreate(selGuru, item['Guru'] || '');
                    selGuru.disabled = false;
                    selGuru.classList.remove('bg-slate-100', 'cursor-not-allowed', 'text-slate-500');
                }
            }
            updateMapelDropdown();
            if(document.getElementById('bbMapel')) document.getElementById('bbMapel').value = item['Mapel'] || '';
            
            const cats = item['Kategori'] ? item['Kategori'].split(',').map(k => k.trim()) : [];
            document.querySelectorAll('input[name="bbKategori"]').forEach(cb => cb.checked = cats.includes(cb.value));
            
            document.getElementById('bbBobot').value = item['Bobot'];
            document.getElementById('bbTa').value = item['TA'] || '';
            document.getElementById('bbSemester').value = item['Semester'] || '';
        }
        function renderTableBobot() {
            const tbody = document.getElementById('tableBobotBody');
            const isGuru = getUserRole() === 'guru';
            if (document.getElementById('thBobotGuru') && document.getElementById('tfBobotColspan')) {
                document.getElementById('thBobotGuru').classList.toggle('hidden', isGuru);
                document.getElementById('tfBobotColspan').colSpan = isGuru ? 4 : 5;
            }
            let totalBobot = 0;
            if(globalBobotData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${isGuru ? 8 : 9}" class="p-4 text-center text-slate-500">Belum ada data bobot</td></tr>`;
            } else {
                tbody.innerHTML = globalBobotData.map((b, i) => {
                    totalBobot += Number(b['Bobot']) || 0;
                    return `<tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 border-b border-slate-100 text-center">${i+1}</td>
                        <td class="p-4 border-b border-slate-100 font-bold text-slate-700">${b['Nama Materi']}</td>
                        <td class="p-4 border-b border-slate-100 text-slate-600 font-medium">${b['Mapel'] || '-'}</td>
                        <td class="p-4 border-b border-slate-100 text-slate-600 ${isGuru ? 'hidden' : ''}">${b['Guru'] || '-'}</td>
                        <td class="p-4 border-b border-slate-100"><span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-md text-xs font-bold">${b['Kategori']}</span></td>
                        <td class="p-4 border-b border-slate-100 text-center font-bold text-indigo-600">${b['Bobot']}%</td>
                        <td class="p-4 border-b border-slate-100 text-center">${b['TA']}</td>
                        <td class="p-4 border-b border-slate-100 text-center">${b['Semester']}</td>
                        <td class="p-4 border-b border-slate-100 text-center">
                            <button onclick="editBobot('${b['ID']}')" class="text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="hapusBobot('${b['ID']}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                }).join('');
            }
            const tDisp = document.getElementById('totalBobotDisplay');
            tDisp.innerText = totalBobot + '%';
            tDisp.className = "p-4 text-center font-black text-lg " + (totalBobot === 100 ? "text-emerald-500" : (totalBobot > 100 ? "text-red-500" : "text-yellow-500"));
        }
        function simpanDataBobot(e) {
            e.preventDefault();
            const inputBobot = Number(document.getElementById('bbBobot').value);
            const editId = document.getElementById('bbId').value;
            
            let currentTotal = globalBobotData.reduce((acc, curr) => acc + (curr['ID'] === editId ? 0 : Number(curr['Bobot'])), 0);
            if((currentTotal + inputBobot) > 100) return ZettNotify.fire({ icon: 'warning', title: 'Gagal Menyimpan', text: `Total bobot tidak boleh > 100%. Saat ini ${currentTotal}%.` });
            
            const checks = Array.from(document.querySelectorAll('input[name="bbKategori"]:checked')).map(cb => cb.value);
            if (checks.length === 0 || checks.length > 2) return ZettNotify.fire({ icon: 'warning', title: 'Gagal', text: 'Pilih 1 - 2 Kategori Penilaian.' });

            showLoadingToast('Menyimpan...'); setBtnLoading('btnSimpanBobot', true, 'Simpan Bobot');
            
            google.script.run
            .withFailureHandler(err => { closeLoadingToast(); setBtnLoading('btnSimpanBobot', false, 'Simpan Bobot'); ZettNotify.fire({icon: 'error', title: 'Error', text: err.message}); })
            .withSuccessHandler(res => {
                closeLoadingToast(); setBtnLoading('btnSimpanBobot', false, 'Simpan Bobot');
                if(res && res.status === 'success') {
                    document.getElementById('formBobot').reset(); tutupModalBobot(); 
                    isDataPreloaded = false; initPenilaianBobot();
                    ZettNotify.fire({icon: 'success', title: 'Berhasil', text: 'Disimpan!'});
                } else ZettNotify.fire({icon: 'error', title: 'Gagal', text: res.message});
            }).simpanBobotPenilaian({
                id: editId, namaMateri: document.getElementById('bbNama').value, mapel: document.getElementById('bbMapel').value,
                kategori: checks.join(', '), bobot: inputBobot, ta: document.getElementById('bbTa').value,
                semester: document.getElementById('bbSemester').value, guru: document.getElementById('bbGuru').value || getUserName() 
            });
        }
        function hapusBobot(id) {
            const exec = () => {
                showLoadingToast('Menghapus...');
                google.script.run
                .withFailureHandler(err => { closeLoadingToast(); ZettNotify.fire({icon: 'error', title: 'Error', text: err.message}); })
                .withSuccessHandler(res => {
                    closeLoadingToast();
                    if(res && res.status==='success') { isDataPreloaded = false; initPenilaianBobot(); ZettNotify.fire({icon: 'success', title: 'Berhasil', text: 'Dihapus!'}); }
                    else ZettNotify.fire({icon: 'error', title: 'Gagal', text: res.message});
                }).hapusBobotPenilaian(id);
            };
            const sw = safeSwal();
            if (sw) sw.fire({ title: 'Hapus?', text: "Tak bisa dikembalikan", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya' }).then((r) => { if(r.isConfirmed) exec(); });
            else if (confirm("Hapus?")) exec();
        }

        // ==========================================
        // PRAKTEK MODULE
        // ==========================================
        function initPenilaianPraktek() {
            const active = getActiveTAAndSemester();
            setSelectedOptionOrCreate(document.getElementById('praktekFilterTA'), active.ta);
            const selSmt = document.getElementById('praktekFilterSemester'); if(selSmt) selSmt.value = active.semester;
            
            const grid = document.getElementById('materiPraktekGrid'); if (!grid) return;
            if (isDataPreloaded) { filterPraktekCards(); return; }
            grid.innerHTML = '<div class="col-span-full py-10 text-center"><div class="inline-block animate-spin rounded-full h-8 w-8 border-indigo-600 border-t-transparent"></div></div>';
            preloadAllData(() => {
                if(globalBobotData.length === 0) grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">Belum ada materi/bobot penilaian.</div>';
                else filterPraktekCards();
            });
        }
        function filterPraktekCards() {
            const grid = document.getElementById('materiPraktekGrid'); if(!grid) return;
            const fTA = document.getElementById('praktekFilterTA').value, fSmt = document.getElementById('praktekFilterSemester').value;
            let fData = globalBobotData.filter(b => b['TA'] === fTA && b['Semester'] === fSmt);
            
            if(fData.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">Tidak ada materi.</div>'; return; }
            grid.innerHTML = fData.map(b => `
            <div onclick="bukaDetailPraktek('${b['ID']}', \`${b['Nama Materi'].replace(/"/g, '&quot;')}\`, \`${b['Mapel'] || '-'}\`, \`${b['Kategori']}\`, '${b['Bobot']}', \`${b['Guru']}\`, '${b['TA']}', '${b['Semester']}')" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all group relative overflow-hidden flex flex-col justify-between min-h-[190px]">
                <div>
                    <div class="absolute top-0 right-0 w-16 h-16 bg-indigo-50 rounded-bl-full z-0 group-hover:bg-indigo-100 transition-colors"></div>
                    <div class="flex justify-between items-start mb-3 relative z-10"><i class="fa-solid fa-file-signature text-2xl text-indigo-500"></i><span class="text-xs font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md border border-indigo-100">Bobot: ${b['Bobot']}%</span></div>
                    <h4 class="font-bold text-slate-800 text-lg mb-1 relative z-10 truncate">${b['Nama Materi']}</h4>
                    <div class="text-xs text-slate-500 mb-1 relative z-10">Mapel: ${b['Mapel'] || '-'}</div>
                    <div class="text-xs text-slate-500 mb-3 relative z-10">Guru: ${b['Guru'] || '-'}</div>
                </div>
                <div class="flex justify-between items-center relative z-10 pt-4 border-t border-slate-50 gap-2">
                    <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md">${b['Kategori']}</span>
                    <button type="button" onclick="event.stopPropagation(); bukaPopupDetailStats('${b['ID']}', \`${b['Nama Materi'].replace(/'/g, "\\'")}\`)" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-lg px-2.5 py-1.5 text-[11px] font-bold"><i class="fa-solid fa-chart-pie"></i> Detail</button>
                </div>
            </div>`).join('');
        }
        function bukaPopupDetailStats(id, nama) {
            document.getElementById('statsMateriNama').innerText = nama;
            const c = document.getElementById('statsContainer'); c.innerHTML = `<div class="text-center py-6"><div class="animate-spin rounded-full h-8 w-8 border-indigo-600 border-t-transparent mx-auto mb-2"></div></div>`;
            document.getElementById('modalDetailStats').classList.remove('hidden');
            
            google.script.run
            .withFailureHandler(err => c.innerHTML = `<div class="text-rose-500 text-center font-bold">Error: ${err.message}</div>`)
            .withSuccessHandler(res => {
                if (res && res.status === 'success' && res.data.classStats.length > 0) {
                    c.innerHTML = res.data.classStats.map(s => {
                        const tot = s.sudah + s.belum, pct = tot > 0 ? Math.round((s.sudah/tot)*100) : 0;
                        return `<div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-3">
                            <div class="flex justify-between text-sm mb-2"><span class="font-bold">Kelas ${s.kelas}</span><span class="text-slate-500 text-xs">${s.sudah}/${tot} (${pct}%)</span></div>
                            <div class="w-full bg-slate-200 rounded-full h-2.5 mb-3"><div class="bg-indigo-600 h-2.5 rounded-full" style="width: ${pct}%"></div></div>
                        </div>`;
                    }).join('');
                } else c.innerHTML = '<div class="text-slate-500 text-center py-6">Tidak ada data.</div>';
            }).getMateriDetailStats(id, getUserRole(), getUserName());
        }
        function tutupModalDetailStats() { document.getElementById('modalDetailStats').classList.add('hidden'); }
        
        function bukaDetailPraktek(id, nama, mapel, kategori, bobot, guru, ta, semester) {
            renderTemplate('contentArea', 'tpl-penilaian-praktek-detail');
            globalCheckedPraktek.clear();
            
            document.getElementById('detPraktekIdMateri').value = id;
            document.getElementById('detPraktekMapelValue').value = mapel;
            document.getElementById('detPraktekTA').value = ta || '';
            document.getElementById('detPraktekSemester').value = semester || '';
            
            document.getElementById('detPraktekMateri').innerText = nama;
            document.getElementById('detPraktekMapelDisplay').innerText = mapel;

        function fetchNilaiDanRender(id, kls) {
            document.getElementById('tablePraktekSiswaBody').innerHTML = '<tr><td colspan="5" class="text-center py-6"><div class="animate-spin rounded-full h-8 w-8 border-indigo-600 border-t-transparent mx-auto"></div></td></tr>';

            .getNilaiPraktek(id, kls, tgl, getUserRole(), g);
        }
        function renderTabelPenilaianPraktek() {
            const tbody = document.getElementById('tablePraktekSiswaBody');
            const fKelas = document.getElementById('filterKelasPraktek').value.toLowerCase();
            const searchEl = document.getElementById('searchNamaPraktek');
            const fNama = searchEl ? searchEl.value.toLowerCase() : '';
            
            let filtered = globalSiswaPraktek.filter(s => (fKelas === '' || s.kelas.toLowerCase() === fKelas) && (fNama === '' || s.nama.toLowerCase().includes(fNama)));

            if(filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-slate-500">Tidak ada data siswa.</td></tr>`; document.getElementById('btnMassalArea').classList.add('hidden'); return; }

            tbody.innerHTML = filtered.map((s, i) => {
                let nis = s.nis.toString();

                    chkHtml = `<input type="checkbox" disabled class="w-4 h-4 text-slate-300 rounded cursor-not-allowed opacity-50">`;

                } else {
                    chkHtml = `<input type="checkbox" class="chk-siswa w-4 h-4 text-indigo-600 rounded cursor-pointer" value="${nis}" onchange="toggleSatuPraktek(this)" ${globalCheckedPraktek.has(nis) ? 'checked' : ''}>`;
                    actHtml = `<button onclick="bukaModalNilai('${nis}', '${s.nama.replace(/'/g, "\\'")}', '${s.kelas}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm mx-auto flex items-center gap-2"><i class="fa-solid fa-pen-to-square"></i> Beri Nilai</button>`;
                }
                return `<tr class="hover:bg-slate-50"><td class="p-4 border-b border-slate-100 text-center">${chkHtml}</td><td class="p-4 border-b border-slate-100 text-center text-slate-500">${i+1}</td><td class="p-4 border-b border-slate-100"><div class="font-bold text-slate-800">${s.nama}</div><div class="text-[10px] text-slate-400">NIS: ${nis}</div></td><td class="p-4 border-b border-slate-100 text-center"><span class="bg-slate-100 px-2 py-1 rounded-md text-xs font-bold text-slate-600">${s.kelas}</span></td><td class="p-4 border-b border-slate-100 text-center">${actHtml}</td></tr>`;
            }).join('');
            updateStatusCheckedPraktek();
        }
        function toggleSatuPraktek(el) { el.checked ? globalCheckedPraktek.add(el.value) : globalCheckedPraktek.delete(el.value); updateStatusCheckedPraktek(); }
        function toggleCheckAllPraktek() {
            const val = document.getElementById('chkAllPraktek').checked;
            document.querySelectorAll('.chk-siswa:not([disabled])').forEach(cb => { cb.checked = val; val ? globalCheckedPraktek.add(cb.value) : globalCheckedPraktek.delete(cb.value); });
            updateStatusCheckedPraktek();
        }
        function updateStatusCheckedPraktek() {
            const tot = document.querySelectorAll('.chk-siswa:not([disabled])').length, chk = document.querySelectorAll('.chk-siswa:not([disabled]):checked').length;
            document.getElementById('chkAllPraktek').checked = (tot > 0 && chk === tot);

            if(globalCheckedPraktek.size > 0) { btnArea.classList.remove('hidden'); document.getElementById('countMassal').innerText = globalCheckedPraktek.size; } else btnArea.classList.add('hidden');
        }

        // ==========================================
        // FUNGSI TERAPKAN NILAI MASAL
        // ==========================================
        function terapkanNilaiMasal() {
            let adaIsi = false;
            globalPraktekKategoriList.forEach((k, idx) => {
                let masterInput = document.getElementById(`master-skor-${idx}`);
                if (masterInput && masterInput.value !== '') {
                    adaIsi = true;
                    let val = masterInput.value;
                    // Terapkan ke semua input siswa yang sesuai dengan kategori ini
                    document.querySelectorAll(`.skor-kategori-idx-${idx}`).forEach(inp => {
                        inp.value = val;
                    });
                }
            });

            if (!adaIsi) {
                ZettNotify.fire({icon: 'info', title: 'Info', text: 'Isi minimal satu nilai master untuk diterapkan.'});
                return;
            }

            // Hitung ulang semua rata-rata siswa
            document.querySelectorAll('.student-masal-group').forEach(el => {
                let nis = el.getAttribute('data-nis');
                hitungRataSiswa(nis);
            });
            
            ZettNotify.fire({icon: 'success', title: 'Berhasil', text: 'Nilai berhasil diterapkan ke semua siswa.', timer: 1500});
        }

        // ==========================================
        // FUNGSI RESET SATU KELAS (DIPERBAIKI)
        // ==========================================
        function resetSatuKelas() {
            const kls = document.getElementById('filterKelasPraktek').value;
            if (!kls) return ZettNotify.fire({icon: 'warning', title: 'Pilih Kelas', text: 'Silakan filter/pilih kelas spesifik terlebih dahulu pada Filter Kelas.'});
            
            const idM = document.getElementById('detPraktekIdMateri').value;

            let fKelas = kls.toLowerCase();
            let siswaKelas = globalSiswaPraktek.filter(s => s.kelas.toLowerCase() === fKelas);
            let toReset = siswaKelas.filter(s => globalNilaiMap[s.nis.toString()]);

            if(toReset.length === 0) return ZettNotify.fire({icon: 'info', title: 'Info', text: 'Belum ada nilai siswa di kelas ini untuk di-reset.'});

            const exec = () => {
                showLoadingToast(`Mereset nilai kelas ${kls}...`);

                // MEMANGGIL BACKEND BARU (1X REQUEST)
                google.script.run
                .withFailureHandler(err => { 
                    closeLoadingToast(); 
                    ZettNotify.fire({icon: 'error', title: 'Error', text: err.message}); 
                })
                .withSuccessHandler(res => {
                    closeLoadingToast();
                    if(res && res.status === 'success') { 
                        toReset.forEach(s => delete globalNilaiMap[s.nis.toString()]); 
                        renderTabelPenilaianPraktek(); 
                        isDataPreloaded = false; 
                        preloadAllData(); 
                        ZettNotify.fire({icon: 'success', title: 'Selesai', text: `Berhasil mereset nilai kelas ${kls}.`}); 
                    }
                    else {
                        ZettNotify.fire({icon: 'error', title: 'Gagal', text: res ? res.message : 'Terjadi kesalahan.'});
                    }
                }).hapusNilaiPraktekKelas({idMateri: idM, kelas: kls});
            };

            const sw = safeSwal();
            if (sw) sw.fire({ title: 'Reset Kelas Ini?', text: `Akan mereset permanen nilai ${toReset.length} siswa di kelas ${kls}. Lanjutkan?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya, Reset' }).then(r => { if(r.isConfirmed) exec(); });
            else if (confirm(`Akan mereset permanen nilai ${toReset.length} siswa di kelas ${kls}. Lanjutkan?`)) exec();
        }

                document.getElementById('modalNilaiTitle').innerHTML = `<i class="fa-solid fa-users text-indigo-500 mr-2"></i> Penilaian Masal (${list.length} Siswa)`;
                
                let html = '';

                        <span><i class="fa-solid fa-wand-magic-sparkles mr-2 text-indigo-500"></i> Terapkan Nilai Seragam</span>
                        <button onclick="terapkanNilaiMasal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow transition-colors flex items-center gap-2"><i class="fa-solid fa-check-double"></i> Terapkan</button>
                    </div>
                    <div class="grid ${globalPraktekKategoriList.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} gap-3">`;

                    html += `<div><label class="block text-[10px] font-bold text-indigo-500 uppercase mb-1">Master Skor ${k}</label><input type="number" id="master-skor-${idx}" class="w-full px-3 py-2 border border-indigo-200 rounded-lg text-sm font-bold text-center bg-white focus:ring-2 focus:ring-indigo-500" min="0" max="100" placeholder="0-100"></div>`;

                html += `</div></div>`;
                // -------------------------------------------

                html += '<div class="space-y-3">';

                    html += `<div class="bg-slate-50 p-4 rounded-xl border border-slate-100 student-masal-group" data-nis="${s.nis}" data-kelas="${s.kelas}" data-nama="${s.nama.replace(/"/g, '&quot;')}"><div class="font-bold mb-3 border-b pb-2 flex justify-between"><span class="truncate pr-2">${s.nama}</span><span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded">${s.kelas}</span></div><div class="grid ${globalPraktekKategoriList.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} gap-3">`;
                    globalPraktekKategoriList.forEach((k, idx) => {

                    });
                    html += `</div><div class="mt-3 flex justify-between bg-white p-2.5 rounded-lg border"><span class="text-xs font-bold text-slate-500">Nilai Akhir</span><span class="text-lg font-black text-indigo-600" id="rata-${s.nis}">0</span></div></div>`;
                });
                inpCont.innerHTML = html + '</div>';
            } else {
                cont.classList.replace('max-w-2xl', 'max-w-sm');
                document.getElementById('singleRataContainer').classList.remove('hidden');

                document.getElementById('modalNilaiRata').innerText = '0';
                
                inpCont.innerHTML = globalPraktekKategoriList.map(k => `<div class="mb-4"><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Skor ${k}</label><input type="number" class="skor-kategori-input w-full px-4 py-3 border border-slate-200 rounded-xl text-lg font-bold text-center shadow-inner" min="0" max="100" oninput="hitungRataPraktek()" placeholder="0 - 100"></div>`).join('');

        function hitungRataSiswa(nis) {
            let t = 0, c = 0; document.querySelectorAll('.skor-input-' + nis).forEach(i => { let v = parseFloat(i.value); if(!isNaN(v)){t+=v; c++;} });
            let r = c>0 ? (t/c).toFixed(1) : 0; if(r.toString().endsWith('.0')) r = r.split('.')[0];
            document.getElementById('rata-'+nis).innerText = r; return parseFloat(r);
        }
        function hitungRataPraktek() {
            let t = 0, c = 0; document.querySelectorAll('.skor-kategori-input').forEach(i => { let v = parseFloat(i.value); if(!isNaN(v)){t+=v; c++;} });
            let r = c>0 ? (t/c).toFixed(1) : 0; if(r.toString().endsWith('.0')) r = r.split('.')[0];
            document.getElementById('modalNilaiRata').innerText = r; return parseFloat(r);
        }
        function tutupModalNilai() { document.getElementById('modalNilaiPraktek').classList.add('hidden'); }

        function prosesSimpanNilaiModal() {
            const tgl = document.getElementById('filterTglPraktek').value, idM = document.getElementById('detPraktekIdMateri').value;
            const mpl = document.getElementById('detPraktekMapelValue').value, ta = document.getElementById('detPraktekTA').value, smt = document.getElementById('detPraktekSemester').value;
            const gf = document.getElementById('detPraktekGuruField'), g = gf ? gf.value : getUserName();
            
            let payloads = [];
            if(isMasalModal) {
                let hasErr = false;
                document.querySelectorAll('.student-masal-group').forEach(el => {
                    let nis = el.getAttribute('data-nis'), r = hitungRataSiswa(nis);
                    if(r>0 && !isNaN(r)) payloads.push({idMateri: idM, nis: nis, namaSiswa: el.getAttribute('data-nama'), kelas: el.getAttribute('data-kelas'), mapel: mpl, nilai: r, tanggal: tgl, guru: g, ta: ta, semester: smt});
                    else hasErr = true;
                });
                if(payloads.length === 0) return ZettNotify.fire({icon: 'warning', title: 'Peringatan', text: 'Tidak ada nilai valid.'});
                if(hasErr) return ZettNotify.fire({icon: 'warning', title: 'Peringatan', text: 'Lengkapi nilai (>0) untuk semua siswa.'});
            } else {
                let r = hitungRataPraktek();
                if(r<=0 || isNaN(r)) return ZettNotify.fire({icon: 'warning', title: 'Peringatan', text: 'Masukkan nilai > 0.'});
                payloads.push({idMateri: idM, nis: targetNisModal, namaSiswa: targetNamaModal, kelas: targetKelasModal, mapel: mpl, nilai: r, tanggal: tgl, guru: g, ta: ta, semester: smt});
            }

            showLoadingToast('Menyimpan nilai...'); setBtnLoading('btnSimpanModalNilai', true, 'Simpan');
            
            google.script.run
            .withFailureHandler(err => { closeLoadingToast(); setBtnLoading('btnSimpanModalNilai', false, 'Simpan'); ZettNotify.fire({icon: 'error', title: 'Error', text: err.message}); })
            .withSuccessHandler(res => {
                closeLoadingToast(); setBtnLoading('btnSimpanModalNilai', false, 'Simpan'); tutupModalNilai();
                if (res.status === 'success') {
                    payloads.forEach(p => globalNilaiMap[p.nis.toString()] = {nilai: p.nilai, status: 'Sudah Dinilai'});
                    if(isMasalModal) { document.getElementById('chkAllPraktek').checked = false; globalCheckedPraktek.clear(); }
                    renderTabelPenilaianPraktek(); isDataPreloaded = false; preloadAllData();
                    ZettNotify.fire({icon: 'success', title: 'Tersimpan', text: 'Nilai berhasil disimpan.', timer: 2000});
                } else ZettNotify.fire({icon: 'error', title: 'Gagal', text: res.message});
            }).simpanNilaiPraktekMasal(payloads);
        }

        function resetSkorPraktek(nis) {
            const exec = () => {
                showLoadingToast('Mereset...');
                const g = document.getElementById('detPraktekGuruField') ? document.getElementById('detPraktekGuruField').value : getUserName();
                google.script.run
                .withFailureHandler(err => { closeLoadingToast(); ZettNotify.fire({icon: 'error', title: 'Error', text: err.message}); })
                .withSuccessHandler(res => {
                    closeLoadingToast();
                    if(res.status === 'success') { delete globalNilaiMap[nis.toString()]; renderTabelPenilaianPraktek(); isDataPreloaded = false; preloadAllData(); ZettNotify.fire({icon: 'success', title: 'Berhasil', text: 'Direset.'}); }
                    else ZettNotify.fire({icon: 'error', title: 'Gagal', text: res.message});
                }).hapusSatuNilaiPraktek({idMateri: document.getElementById('detPraktekIdMateri').value, nis: nis.toString(), tanggal: document.getElementById('filterTglPraktek').value, guru: g});
            };
            const sw = safeSwal();
            if (sw) sw.fire({ title: 'Hapus Nilai?', text: "Akan direset.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya' }).then(r => { if(r.isConfirmed) exec(); });
            else if (confirm("Reset Nilai?")) exec();
        }

        // ==========================================
        // LAPORAN MODULE (OPTIMIZED WITH DICTIONARY O(1))
        // ==========================================
        function initPenilaianLaporan(forceRefresh = false) {
            const active = getActiveTAAndSemester();
            setSelectedOptionOrCreate(document.getElementById('lapTA'), active.ta);
            const lSmt = document.getElementById('lapSmt'); if(lSmt) lSmt.value = active.semester;
            
            if (forceRefresh) isDataPreloaded = false;
            const tBody = document.getElementById('lapTBody'); if (!tBody) return;

            tBody.innerHTML = '<tr><td colspan="11" class="text-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-indigo-600 border-t-transparent mx-auto mb-2"></div> Memproses...</td></tr>';
            preloadAllData(() => setupLaporanFiltersAndRender());

            const selG = document.getElementById('lapGuru');
            if(selG) {
                selG.innerHTML = '<option value="">Semua Guru</option>' + globalGuruList.map(g => `<option value="${g}">${g}</option>`).join('');

            const g = document.getElementById('lapGuru').value, selK = document.getElementById('lapKelas');

        function updateLapMateriDropdown() {
            const selM = document.getElementById('lapMateri'); if(!selM) return;
            const fG = document.getElementById('lapGuru') ? document.getElementById('lapGuru').value.toLowerCase() : '';
            const fTA = document.getElementById('lapTA') ? document.getElementById('lapTA').value : '';
            const fSmt = document.getElementById('lapSmt') ? document.getElementById('lapSmt').value : '';
            
            let fBobot = lapBobot.filter(b => (fG === '' || (b['Guru'] && b['Guru'].toLowerCase() === fG)) && (fTA === '' || b['TA'] === fTA) && (fSmt === '' || b['Semester'] === fSmt));
            selM.innerHTML = '<option value="">Semua Materi</option>' + fBobot.map(b => `<option value="${b['ID']}">${b['Nama Materi']} (${b['Mapel'] || '-'})</option>`).join('');
        }
        
        function renderTabelLaporan() {
            const fTA = document.getElementById('lapTA').value, fSmt = document.getElementById('lapSmt').value, fK = document.getElementById('lapKelas').value.toLowerCase();
            const fG = document.getElementById('lapGuru') ? document.getElementById('lapGuru').value.toLowerCase() : '';
            const fM = document.getElementById('lapMateri') ? document.getElementById('lapMateri').value : '';
            
            let fBobot = lapBobot.filter(b => (fG === '' || (b['Guru'] && b['Guru'].toLowerCase() === fG)) && (fTA === '' || b['TA'] === fTA) && (fSmt === '' || b['Semester'] === fSmt) && (fM === '' || b['ID'] === fM));
            
            let hr1 = `<tr><th rowspan="2" class="p-3 border border-indigo-100 text-center bg-indigo-50">No</th><th rowspan="2" class="p-3 border bg-indigo-50">NIS</th><th rowspan="2" class="p-3 border bg-indigo-50">Nama</th><th rowspan="2" class="p-3 border text-center bg-indigo-50">Kelas</th>`;
            let hr2 = `<tr>`;
            
            fBobot.forEach(b => {
                hr1 += `<th colspan="2" class="p-3 border text-center bg-indigo-100/50"><div class="text-xs truncate max-w-[120px] mx-auto">${b['Nama Materi']}</div><div class="text-[10px] text-indigo-600">Bobot: ${b['Bobot']}%</div></th>`;
                hr2 += `<th class="p-2 border text-center text-[10px] bg-slate-50">Tanggal</th><th class="p-2 border text-center text-[10px] bg-slate-50">Nilai</th>`;
            });
            document.getElementById('lapTHead').innerHTML = hr1 + `<th rowspan="2" class="p-3 border text-center text-emerald-700 bg-emerald-50">NILAI AKHIR</th></tr>` + hr2 + `</tr>`;

            let fSiswa = lapSiswa.filter(s => fK === '' || s.kelas.toLowerCase() === fK);
            
            // OPTIMASI O(1) LOOKUP: Create a dictionary for fast inner-loop access
            const nilaiDict = {};
            lapNilai.forEach(n => nilaiDict[`${n.nis}_${n.idMateri}`] = n);
            
            const totalPersen = fBobot.reduce((acc, curr) => acc + Number(curr['Bobot']), 0);

            if(fSiswa.length === 0) { document.getElementById('lapTBody').innerHTML = `<tr><td colspan="${5 + (fBobot.length * 2)}" class="text-center py-6 text-slate-500">Tidak ada data siswa.</td></tr>`; return; }

            document.getElementById('lapTBody').innerHTML = fSiswa.map((s, i) => {
                let html = `<tr class="hover:bg-slate-50"><td class="p-3 border text-center">${i+1}</td><td class="p-3 border text-xs text-slate-500">${s.nis}</td><td class="p-3 border font-bold text-slate-800">${s.nama}</td><td class="p-3 border text-center"><span class="bg-slate-100 px-2 py-0.5 rounded text-xs">${s.kelas}</span></td>`;
                let na = 0;
                
                fBobot.forEach(b => {
                    let d = nilaiDict[`${s.nis}_${b['ID']}`];
                    let skor = d ? Number(d.nilai) : 0;
                    let tgl = (d && d.tanggal && d.tanggal.includes('-')) ? d.tanggal.split('-').reverse().join('/') : (d && d.tanggal ? d.tanggal : '-');
                    na += (skor * Number(b['Bobot']) / 100);
                    html += `<td class="p-3 border text-center text-[10px] text-slate-500">${tgl}</td><td class="p-3 border text-center font-medium ${skor === 0 ? 'text-slate-300' : 'text-slate-700'}">${skor || '-'}</td>`;
                });
                
                let col = na >= 75 ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50';
                if(totalPersen < 100 && totalPersen > 0) col = 'text-yellow-600 bg-yellow-50'; 
                return html + `<td class="p-3 border text-center font-black ${col}">${na.toFixed(1)}</td></tr>`;
            }).join('');
        }

        function cetakBelumDinilai() {
            const fK = document.getElementById('lapKelas').value.toLowerCase();
            const selG = document.getElementById('lapGuru'), fG = selG ? selG.value.toLowerCase() : '';
            const fTA = document.getElementById('lapTA').value, fSmt = document.getElementById('lapSmt').value;
            const selM = document.getElementById('lapMateri'), fM = selM ? selM.value : '';
            
            let fBobot = lapBobot.filter(b => (fG === '' || (b['Guru'] && b['Guru'].toLowerCase() === fG)) && (fTA === '' || b['TA'] === fTA) && (fSmt === '' || b['Semester'] === fSmt) && (fM === '' || b['ID'] === fM));
            if (fBobot.length === 0) return ZettNotify.fire({ icon: 'info', title: 'Info', text: 'Tidak ada materi.' });

            let fSiswa = lapSiswa.filter(s => fK === '' || s.kelas.toLowerCase() === fK);
            if (fSiswa.length === 0) return ZettNotify.fire({ icon: 'info', title: 'Info', text: 'Tidak ada siswa.' });

            // OPTIMASI O(1) LOOKUP
            const nilaiDict = {};
            lapNilai.forEach(n => nilaiDict[`${n.nis}_${n.idMateri}`] = n);

            let dataCetak = [];
            fSiswa.forEach(s => {
                let mBelum = fBobot.filter(b => !nilaiDict[`${s.nis}_${b['ID']}`] || Number(nilaiDict[`${s.nis}_${b['ID']}`].nilai) === 0).map(b => b['Nama Materi']);
                if (mBelum.length > 0) dataCetak.push({ nis: s.nis, nama: s.nama, kelas: s.kelas, materiBelum: mBelum });
            });

            if (dataCetak.length === 0) return ZettNotify.fire({ icon: 'success', title: 'Hebat!', text: 'Semua siswa sudah dinilai.' });

            let lblM = fM !== '' && selM.options[selM.selectedIndex] ? selM.options[selM.selectedIndex].text : 'Semua Materi';
            let htmlPrint = `<html><head><title>Cetak Belum Dinilai</title><style>body{font-family:Arial,sans-serif;padding:20px;color:#333}.header{text-align:center;margin-bottom:20px;border-bottom:2px solid #333;padding-bottom:10px}.header h2{margin:0 0 5px 0;font-size:22px}.header p{margin:0;font-size:14px;color:#555}.info{margin-bottom:15px;font-size:14px}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #333;padding:6px 10px;text-align:left;font-size:13px}th{background-color:#f4f4f5;font-weight:bold;text-transform:uppercase;font-size:11px}.tc{text-align:center}@media print{body{padding:0}@page{margin:1cm}}</style></head><body><div class="header"><h2>Laporan Siswa Belum Dinilai</h2><p>Tahun Ajaran: ${fTA} | Semester: ${fSmt}</p></div><div class="info"><strong>Kelas:</strong> ${fK===''?'Semua Kelas':document.getElementById('lapKelas').value}<br><strong>Guru:</strong> ${selG&&selG.value!==''?selG.options[selG.selectedIndex].text:'Semua Guru'}<br><strong>Materi:</strong> ${lblM}</div><table><thead><tr><th class="tc" style="width:5%">No</th><th style="width:15%">NIS</th><th style="width:30%">Nama</th><th class="tc" style="width:15%">Kelas</th><th style="width:35%">Keterangan</th></tr></thead><tbody>` + dataCetak.map((item, i) => `<tr><td class="tc">${i + 1}</td><td>${item.nis}</td><td><strong>${item.nama}</strong></td><td class="tc">${item.kelas}</td><td style="height:20px;"></td></tr>`).join('') + `</tbody></table><script>window.onload=function(){setTimeout(function(){window.print();},500);}<\/script></body></html>`;

            const w = window.open('', '_blank');
            if (w) { w.document.open(); w.document.write(htmlPrint); w.document.close(); } 
            else ZettNotify.fire({ icon: 'warning', title: 'Pop-up Diblokir', text: 'Mohon izinkan pop-up untuk mencetak.' });
        }

        // Auto Preload
        preloadAllData();
</script>
