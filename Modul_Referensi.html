<!-- Tambahkan library SweetAlert2 via CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Tambahkan library Cropper.js via CDN untuk fitur crop manual -->
<link class="print-hide" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
<script class="print-hide" src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<script>
    /** ================= ZETTBOT TOAST CONFIG (POJOK KANAN ATAS) ================= **/
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer)
            toast.addEventListener('mouseleave', Swal.resumeTimer)
        }
    });

    /** ================= LOGIKA CROPPER MANUAL ================= **/
    let currentCropper = null;
    let cropTargetId = '';

    function processImage(input, targetId) {
        if (!input.files || !input.files[0]) return;
        
        cropTargetId = targetId;
        var reader = new FileReader();
        
        reader.onload = function(e) {
            var modal = document.getElementById('modalCropper');
            var image = document.getElementById('refImageToCrop');
            
            if (currentCropper) {
                currentCropper.destroy();
                currentCropper = null;
            }
            
            image.src = e.target.result;
            
            // Tampilkan modal terlebih dahulu agar container terbentuk secara fisik 
            modal.classList.remove('hidden');
            
            // Menginisialisasi Cropper hanya SETELAH foto benar-benar dimuat ke container
            image.onload = function() {
                if (currentCropper) {
                    currentCropper.destroy();
                }
                currentCropper = new Cropper(image, {
                    aspectRatio: 1, 
                    viewMode: 1,    
                    autoCropArea: 1,
                    background: false,
                    responsive: true,
                    checkOrientation: false
                });
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function closeCropperModal() {
        document.getElementById('modalCropper').classList.add('hidden');
        if (currentCropper) {
            currentCropper.destroy();
            currentCropper = null;
        }
    }

    function saveCrop() {
        if (!currentCropper) return;
        
        var canvas = currentCropper.getCroppedCanvas({
            width: 512,
            height: 512,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high'
        });
        
        var base64 = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById(cropTargetId).value = base64;
        
        var previewImg = document.getElementById(cropTargetId + '_preview');
        if (previewImg) {
            previewImg.src = base64;
            previewImg.classList.remove('hidden');
        }
        
        closeCropperModal();
    }


    /** Helper: Update Penomoran Baris Tabel (Tanpa Re-Render Ulang) **/
    function updateRowNumbers(tableId, rowPrefix) {
        var tbody = document.getElementById(tableId);
        if(!tbody) return;
        var rows = tbody.querySelectorAll('tr[id^="'+rowPrefix+'"]');
        rows.forEach(function(row, index) {
            var noTd = row.querySelector('.row-number');
            if(noTd) noTd.innerText = index + 1;
        });
        if(rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-slate-500 font-medium">Data tidak ditemukan.</td></tr>';
        }
    }

    /** ================= ZETTBOT: VARIABEL GLOBAL, CACHE, & LOCKING ================= **/
    var dataGuruCache = [];
    var isGuruLoaded = false;
    var isFetchingGuru = false; 
    var modeGuru = 'tambah';
    var idGuruAktif = '';
    
    var dataSiswaCache = [];
    var isSiswaLoaded = false;
    var isFetchingSiswa = false; 
    var modeSiswa = 'tambah';
    var idSiswaAktif = '';

    var dataMapingCache = [];
    var isMapingLoaded = false;
    var isFetchingMaping = false; 
    var listGuruForMaping = [];
    var modeMaping = 'tambah';
    var idMapingAktif = '';
    
    var availableKelasList = [];
    var selectedKelasMaping = [];

    var listTahunAjaranCache = [];
    var mapKelasPerTaCache = {};

    function preloadDataReferensi() {
        fetchDataGuru(true);
        fetchDataSiswa(true);
        fetchDataMaping(true);
    }

    /** ================= LOGIKA GURU ================= **/
    
    function addMapelInput(nama) {
        if (typeof nama === 'undefined') nama = '';
        var cont = document.getElementById('containerMapelInputs');
        var div = document.createElement('div');
        div.className = "flex gap-2 mb-2 animate-fade";
        
        div.innerHTML = '<input type="text" placeholder="Nama Mapel (Contoh: Matematika Wajib)" value="'+nama+'" class="mapel-nama flex-1 border p-2.5 rounded-xl text-xs bg-white outline-none focus:ring-1 focus:ring-indigo-500"><button type="button" onclick="this.parentElement.remove()" class="text-red-500 bg-red-50 hover:bg-red-100 rounded-xl px-3 transition"><i class="fa-solid fa-trash"></i></button>';
        cont.appendChild(div);
    }

    function showMapelDetail(id) {
        var data = dataGuruCache.find(function(x) { return x.id_guru === id; });
        if(!data) return;
        var body = document.getElementById('listMapelBody');
        
        body.innerHTML = data.mapel_data.map(function(m, i) { 
            return '<tr><td class="p-2 border border-slate-100 text-center text-slate-500">'+(i+1)+'</td><td class="p-2 border border-slate-100 font-medium">'+m+'</td></tr>'; 
        }).join('');
        document.getElementById('modalMapelDetail').classList.remove('hidden');
    }

    function buildRowGuru(g, i) {
        var avatar = g.foto ? g.foto : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(g.nama_guru) + '&background=e0e7ff&color=4f46e5';
        return '<tr id="row-guru-'+g.id_guru+'" class="border-b border-slate-50 hover:bg-slate-50/80 transition-colors text-sm">' +
            '<td class="p-4 text-center font-medium text-slate-500 row-number">'+i+'</td>' +
            '<td class="p-4"><img src="'+avatar+'" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover"></td>' +
            '<td class="p-4 font-semibold text-slate-700">'+g.nip+'</td>' +
            '<td class="p-4 font-bold text-slate-800">'+g.nama_guru+'</td>' +
            '<td class="p-4 text-center"><button onclick="showMapelDetail(\''+g.id_guru+'\')" class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-sm" title="Lihat Mapel"><i class="fa-solid fa-eye"></i></button></td>' +
            '<td class="p-4 flex justify-center gap-2">' +
                '<button onclick="showGuruModal(\'edit\', \''+g.id_guru+'\')" class="w-8 h-8 rounded-lg bg-amber-50 text-amber-500 hover:bg-amber-500 hover:text-white transition-all shadow-sm" title="Edit"><i class="fa-solid fa-pen text-xs"></i></button>' +
                '<button onclick="hapusGuru(\''+g.id_guru+'\')" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Hapus"><i class="fa-solid fa-trash-can text-xs"></i></button>' +
            '</td></tr>';
    }

    function renderTableGuru(forceRender) {
        var tbody = document.getElementById('tableDataGuru');
        if(!tbody) return;
        
        var searchVal = document.getElementById('searchGuru') ? document.getElementById('searchGuru').value.toLowerCase() : '';
        
        if (!forceRender && tbody.getAttribute('data-rendered') === 'true' && tbody.getAttribute('data-search') === searchVal) {
            return;
        }

        var filtered = dataGuruCache.filter(function(g) {
            return g.nip.toLowerCase().indexOf(searchVal) !== -1 || g.nama_guru.toLowerCase().indexOf(searchVal) !== -1;
        });

        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-slate-500 font-medium">Data Guru tidak ditemukan.</td></tr>';
        } else {
            tbody.innerHTML = filtered.map(function(g, i) { return buildRowGuru(g, i + 1); }).join('');
        }
        
        tbody.setAttribute('data-rendered', 'true');
        tbody.setAttribute('data-search', searchVal);
    }

    // ZettBOT Update: Ditambahkan isSilent parameter untuk auto-sync background tanpa muncul spinner loading
    function fetchDataGuru(isPreload, isSilent) {
        var tbody = document.getElementById('tableDataGuru');
        
        if (isGuruLoaded && !isSilent) {
            if (tbody && !isPreload) renderTableGuru(); 
            return;
        }

        if (isFetchingGuru) return; 
        isFetchingGuru = true;
        
        if (tbody && !isPreload && !isSilent) tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8"><div class="loader-spin border-slate-300 border-t-indigo-600 mx-auto"></div><p class="text-slate-500 mt-2 text-sm">Memuat data Guru...</p></td></tr>';
        
        try {
            var timeoutFailsafe = setTimeout(function() {
                isFetchingGuru = false;
                if(tbody && !isPreload && !isSilent) tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-amber-600 bg-amber-50 rounded-xl"><span class="font-bold">Waktu Habis (Timeout)</span></td></tr>';
            }, 15000);
            
            google.script.run
            .withSuccessHandler(function(res) {
                clearTimeout(timeoutFailsafe);
                isFetchingGuru = false;
                if(res && res.status === 'success') {
                    var newData = Array.isArray(res.data) ? res.data : [];
                    var isChanged = JSON.stringify(newData) !== JSON.stringify(dataGuruCache);
                    
                    dataGuruCache = newData;
                    listGuruForMaping = dataGuruCache; 
                    isGuruLoaded = true;
                    
                    // Render jika ini load pertama kali atau data cache server berbeda (ada perubahan dari user lain)
                    if (document.getElementById('tableDataGuru') && (!isPreload || isChanged)) renderTableGuru(true); 
                } else {
                    if (document.getElementById('tableDataGuru') && !isPreload && !isSilent) document.getElementById('tableDataGuru').innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">Error Server: ' + (res ? res.message : '') + '</td></tr>';
                }
            })
            .withFailureHandler(function(err) {
                clearTimeout(timeoutFailsafe);
                isFetchingGuru = false;
                if (document.getElementById('tableDataGuru') && !isPreload && !isSilent) document.getElementById('tableDataGuru').innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">Gagal Koneksi: ' + err.message + '</td></tr>';
            })
            .getDataGuruZett();
        } catch(e) {
            isFetchingGuru = false;
            if (tbody && !isPreload && !isSilent) tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">Error Sistem JS: ' + e.message + '</td></tr>';
        }
    }

    function showGuruModal(mode, id) {
        if (typeof mode === 'undefined') mode = 'tambah';
        modeGuru = mode;
        document.getElementById('formGuru').reset();
        document.getElementById('containerMapelInputs').innerHTML = '';
        
        var imgPreview = document.getElementById('guru_foto_val_preview');
        
        if (mode === 'edit' && id) {
            var data = dataGuruCache.find(function(x){ return x.id_guru === id; });
            if(data) {
                idGuruAktif = data.id_guru;
                document.getElementById('guruModalTitle').innerText = 'Edit Data Guru';
                document.getElementById('guru_nip').value = data.nip || '';
                document.getElementById('guru_nama').value = data.nama_guru || '';
                document.getElementById('guru_foto_val').value = data.foto || '';
                document.getElementById('guru_username').value = data.username || '';
                document.getElementById('guru_password').value = data.password || '';
                
                if (data.foto) {
                    imgPreview.src = data.foto;
                    imgPreview.classList.remove('hidden');
                } else {
                    imgPreview.src = '';
                    imgPreview.classList.add('hidden');
                }

                if(data.mapel_data && data.mapel_data.length > 0) {
                    data.mapel_data.forEach(function(m) { addMapelInput(m); });
                }
            }
        } else {
            idGuruAktif = '';
            document.getElementById('guruModalTitle').innerText = 'Tambah Data Guru';
            addMapelInput('');
            imgPreview.src = '';
            imgPreview.classList.add('hidden');
        }
        document.getElementById('modalFormGuru').classList.remove('hidden');
    }

    function closeGuruModal() { document.getElementById('modalFormGuru').classList.add('hidden'); }

    function saveDataGuru(e) {
        e.preventDefault();
        var mapels = [];
        
        document.querySelectorAll('#containerMapelInputs div').forEach(function(div) {
            var n = div.querySelector('.mapel-nama').value.trim();
            if(n) mapels.push(n); 
        });
        
        var nip = document.getElementById('guru_nip').value.trim();
        var payload = {
            nip: nip, 
            nama_guru: document.getElementById('guru_nama').value.trim(),
            mapel_data: mapels, 
            foto: document.getElementById('guru_foto_val').value.trim(),
            username: document.getElementById('guru_username').value.trim() || nip,
            password: document.getElementById('guru_password').value.trim() || nip
        };

        var btn = document.getElementById('btnSimpanGuru');
        var span = btn.querySelector('span');
        btn.disabled = true; span.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Menyimpan...';

        var act = modeGuru === 'edit' ? 'updateDataGuruZett' : 'simpanDataGuruZett';
        if(modeGuru === 'edit') payload.id_guru = idGuruAktif;
        
        google.script.run.withSuccessHandler(function(res) {
            btn.disabled = false; span.innerHTML = 'Simpan Data Guru';
            closeGuruModal();
            
            if(res && res.status === 'success') {
                Toast.fire({ icon: 'success', title: 'Berhasil disimpan' });
                
                if(modeGuru === 'edit') {
                    var idx = dataGuruCache.findIndex(function(x) { return x.id_guru === payload.id_guru; });
                    if(idx !== -1) {
                        dataGuruCache[idx] = Object.assign(dataGuruCache[idx], payload);
                    }
                } else {
                    payload.id_guru = res.id;
                    dataGuruCache.push(payload);
                }
                renderTableGuru(true);
            } else {
                Toast.fire({ icon: 'error', title: res ? res.message : 'Gagal menyimpan' });
            }
        })[act](payload);
    }

    function hapusGuru(id) {
        Swal.fire({title:'Hapus?', icon:'warning', showCancelButton:true}).then(function(r) {
            if(r.isConfirmed) {
                Swal.fire({title: 'Menghapus...', showConfirmButton: false, didOpen: function() { Swal.showLoading(); }});
                google.script.run.withSuccessHandler(function(res) { 
                    Swal.close(); 
                    if(res && res.status === 'success') {
                        Toast.fire({ icon: 'success', title: 'Data berhasil dihapus' });
                        dataGuruCache = dataGuruCache.filter(function(x) { return x.id_guru !== id; });
                        renderTableGuru(true);
                    } else {
                        Toast.fire({ icon: 'error', title: res ? res.message : 'Gagal menghapus' });
                    }
                }).hapusDataGuruZett(id);
            }
        });
    }

    /** ================= LOGIKA SISWA ================= **/

    function populateFilterKelasSiswa() {
        var sel = document.getElementById('filterKelasSiswa');
        if(!sel) return;
        var unique = [];
        dataSiswaCache.forEach(function(s) {
            if(s.kelas && s.kelas !== '-' && unique.indexOf(s.kelas) === -1) unique.push(s.kelas);
        });
        unique.sort();
        var currentVal = sel.value;
        var html = '<option value="">Semua Kelas</option>';
        unique.forEach(function(k) { html += '<option value="'+k+'">'+k+'</option>'; });
        sel.innerHTML = html;
        if(unique.indexOf(currentVal) !== -1) sel.value = currentVal;
    }

    function buildRowSiswa(s, i) {
        var avatar = s.foto ? s.foto : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(s.nama_siswa) + '&background=e0e7ff&color=4f46e5';
        return '<tr id="row-siswa-'+s.id_siswa+'" class="border-b border-slate-50 hover:bg-slate-50/80 transition-colors text-sm">' +
            '<td class="p-4 text-center font-medium text-slate-500 row-number">'+i+'</td>' +
            '<td class="p-4"><img src="'+avatar+'" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover"></td>' +
            '<td class="p-4 font-semibold text-slate-700">'+s.nis+'</td>' +
            '<td class="p-4 font-bold text-slate-800">'+s.nama_siswa+'</td>' +
            '<td class="p-4">'+s.kelas+'</td>' +
            '<td class="p-4 flex justify-center gap-2">' +
                '<button onclick="showSiswaModal(\'edit\', \''+s.id_siswa+'\')" class="w-8 h-8 rounded-lg bg-amber-50 text-amber-500 hover:bg-amber-500 hover:text-white transition-all shadow-sm" title="Edit"><i class="fa-solid fa-pen text-xs"></i></button>' +
                '<button onclick="hapusSiswa(\''+s.id_siswa+'\')" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Hapus"><i class="fa-solid fa-trash-can text-xs"></i></button>' +
            '</td></tr>';
    }

    function renderTableSiswa(forceRender) {
        var tbody = document.getElementById('tableDataSiswa');
        if(!tbody) return;
        
        var searchVal = document.getElementById('searchSiswa') ? document.getElementById('searchSiswa').value.toLowerCase() : '';
        var kelasVal = document.getElementById('filterKelasSiswa') ? document.getElementById('filterKelasSiswa').value : '';

        if (!forceRender && tbody.getAttribute('data-rendered') === 'true' && tbody.getAttribute('data-search') === searchVal && tbody.getAttribute('data-kelas') === kelasVal) {
            return;
        }

        var filtered = dataSiswaCache.filter(function(s) {
            var matchSearch = s.nis.toLowerCase().indexOf(searchVal) !== -1 || s.nama_siswa.toLowerCase().indexOf(searchVal) !== -1;
            var matchKelas = kelasVal === '' || s.kelas === kelasVal;
            return matchSearch && matchKelas;
        });

        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-slate-500 font-medium">Data Siswa tidak ditemukan.</td></tr>';
        } else {
            tbody.innerHTML = filtered.map(function(s, i) { return buildRowSiswa(s, i + 1); }).join('');
        }

        tbody.setAttribute('data-rendered', 'true');
        tbody.setAttribute('data-search', searchVal);
        tbody.setAttribute('data-kelas', kelasVal);
    }

    // ZettBOT Update: Ditambahkan isSilent parameter
    function fetchDataSiswa(isPreload, isSilent) {
        var tbody = document.getElementById('tableDataSiswa');
        
        if (isSiswaLoaded && !isSilent) {
            if (document.getElementById('tableDataSiswa') && !isPreload) {
                populateFilterKelasSiswa();
                renderTableSiswa(); 
            }
            return;
        }

        if (isFetchingSiswa) return;
        isFetchingSiswa = true;

        if(tbody && !isPreload && !isSilent) tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8"><div class="loader-spin border-slate-300 border-t-indigo-600 mx-auto"></div><p class="text-slate-500 mt-2 text-sm">Memuat data Siswa...</p></td></tr>';
        
        try {

    function sendChunkSiswaData(chunkArray) {
        return new Promise(function(resolve, reject) {
            google.script.run
            .withSuccessHandler(function(res) {
                if(res && res.status === 'success') resolve(res);
                else reject(new Error(res ? res.message : 'Unknown Server Error'));
            })
            .withFailureHandler(function(err) { reject(err); })
            .simpanDataSiswaMassalZett(chunkArray);
        });
    }

    async function prosesMassalSiswa() {
        var textData = document.getElementById('textareaMassalSiswa').value.trim();
        if(!textData) {
            Toast.fire({ icon: 'warning', title: 'Kotak isian masih kosong!' });
            return;
        }

        var rows = textData.split('\n');
        var validData = [];
        
        for(var i=0; i<rows.length; i++) {
            var rowContent = rows[i].trim();
            if(!rowContent) continue; 
            
            var cols = rowContent.split('\t');
            if(cols.length >= 3 && cols[0].trim() !== '') {
                validData.push([cols[0].trim(), cols[1].trim(), cols[2].trim()]);
            } else {
                Toast.fire({ icon: 'error', title: 'Baris ' + (i+1) + ' formatnya salah. Pastikan copy/paste tepat 3 kolom dari Excel.' });
                return;
            }
        }

        var totalData = validData.length;
        if(totalData === 0) {
            Toast.fire({ icon: 'warning', title: 'Tidak ada data valid yang dapat diproses.' });
            return;
        }

        var btn = document.getElementById('btnProsesMassalSiswa');
        var span = btn.querySelector('span');
        var icon = btn.querySelector('i');
        
        btn.disabled = true;
        icon.className = 'fa-solid fa-spinner fa-spin';
        span.innerText = 'Memproses...';
        
        document.getElementById('progressAreaSiswa').classList.remove('hidden');
        var progressLabel = document.getElementById('progressLabelSiswa');
        var progressText = document.getElementById('progressTextSiswa');
        var progressBar = document.getElementById('progressBarSiswa');
        
        var chunkSize = 50; 
        var processedCount = 0;

        try {
            for(var j=0; j<totalData; j+=chunkSize) {
                var chunk = validData.slice(j, j+chunkSize);
                progressLabel.innerText = 'Mengirim paket data ke server...';
                
                await sendChunkSiswaData(chunk);
                
                processedCount += chunk.length;
                var percent = Math.round((processedCount / totalData) * 100);
                
                progressBar.style.width = percent + '%';
                progressText.innerText = processedCount + ' / ' + totalData;
                progressLabel.innerText = 'Paket tersimpan.';
            }
            
            closeMassalSiswaModal();
            isSiswaLoaded = false; 
            fetchDataSiswa(); 
            Toast.fire({ icon: 'success', title: totalData + ' data Siswa berhasil disimpan massal.' });
            
        } catch(error) {
            Toast.fire({ icon: 'error', title: error.message });
        } finally {
            btn.disabled = false;
            icon.className = 'fa-solid fa-file-excel';
            span.innerText = 'Proses Data Massal';
        }
    }

        e.preventDefault();
        var idGuru = document.getElementById('maping_id_guru').value;
        var guruData = listGuruForMaping.find(function(g) { return g.id_guru === idGuru; });
        var mapelVal = document.getElementById('maping_mapel').value;
        var kelasVal = document.getElementById('maping_kelas').value.trim();
        
        if(!guruData) { Toast.fire({ icon: 'error', title: 'Silakan pilih guru dengan benar!' }); return; }
        if(!mapelVal) { Toast.fire({ icon: 'warning', title: 'Silakan pilih Mata Pelajaran!' }); return; }
        if(!kelasVal) { Toast.fire({ icon: 'warning', title: 'Silakan pilih minimal 1 Kelas!' }); return; }

        var payload = {
            id_guru: guruData.id_guru,
            nip: guruData.nip,
            nama_guru: guruData.nama_guru,
            mapel: mapelVal,
            kelas: kelasVal
        };

        var btn = document.getElementById('btnSimpanMaping');
        var span = btn.querySelector('span');
        btn.disabled = true; span.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Menyimpan...';

        var act = modeMaping === 'edit' ? 'updateDataMapingZett' : 'simpanDataMapingZett';
        if(modeMaping === 'edit') payload.id_maping = idMapingAktif;

        google.script.run.withSuccessHandler(function(res) {
            btn.disabled = false; span.innerHTML = 'Simpan Maping';
            closeMapingModal();
            
            if(res && res.status === 'success') {
                Toast.fire({ icon: 'success', title: 'Berhasil disimpan' });
                
                if(modeMaping === 'edit') {
                    var idx = dataMapingCache.findIndex(function(x) { return x.id_maping === payload.id_maping; });
                    if(idx !== -1) {
                        dataMapingCache[idx] = Object.assign(dataMapingCache[idx], payload);
                    }
                } else {
                    payload.id_maping = res.id;
                    dataMapingCache.push(payload);
                }
                renderTableMaping(true);
            } else {
                Toast.fire({ icon: 'error', title: res ? res.message : 'Gagal menyimpan' });
            }
        })[act](payload);
    }

    function hapusMaping(id) {
        Swal.fire({title:'Hapus Maping?', text:'Data maping ini akan terhapus!', icon:'warning', showCancelButton:true}).then(function(r) {
            if(r.isConfirmed) {
                Swal.fire({title: 'Menghapus...', showConfirmButton: false, didOpen: function() { Swal.showLoading(); }});
                google.script.run.withSuccessHandler(function(res) { 
                    Swal.close(); 
                    if(res && res.status === 'success') {
                        Toast.fire({ icon: 'success', title: 'Berhasil dihapus' });
                        dataMapingCache = dataMapingCache.filter(function(x) { return x.id_maping !== id; });
                        renderTableMaping(true);
                    } else {
                        Toast.fire({ icon: 'error', title: res ? res.message : 'Gagal menghapus' });
                    }
                }).hapusDataMapingZett(id);
            }
        });
    }

    setTimeout(function() {
        // Tarikan pertama saat halaman terbuka
        if (!isGuruLoaded || !isSiswaLoaded || !isMapingLoaded) {
            preloadDataReferensi();
        }
        
        // ZettBOT: Auto-Sync Background Polling
        // Sinkronisasi data ke server hanya akan berjalan pada tab/menu yang sedang terbuka di layar.
        // Mengeksekusi fetch secara 'silent' sehingga data langsung berubah instan tanpa muncul ikon loading
        setInterval(function() {
            if (document.getElementById('tableDataGuru')) fetchDataGuru(true, true);
            if (document.getElementById('tableDataSiswa')) fetchDataSiswa(true, true);
            if (document.getElementById('tableDataMaping')) fetchDataMaping(true, true);
        }, 15000); // Sinkronisasi setiap 15 detik
        
    }, 500);

</script>
